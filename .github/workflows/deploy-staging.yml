name: deploy-staging

# Build images, push to GHCR, kubectl apply to staging on every merge to main.
# Production deploys are triggered by tag push and live in deploy-prod.yml.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/deadwake/progctf/backend
  IMAGE_FRONTEND: ghcr.io/deadwake/progctf/frontend
  K8S_NAMESPACE: progctf-fleet

jobs:

  build-and-push:
    name: build & push images
    runs-on: ubuntu-latest
    outputs:
      backend-tag: ${{ steps.tags.outputs.backend-tag }}
      frontend-tag: ${{ steps.tags.outputs.frontend-tag }}
      cfg-checksum: ${{ steps.checksum.outputs.cfg-checksum }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tags
        run: |
          SHA=$(git rev-parse --short=12 HEAD)
          echo "backend-tag=${{ env.IMAGE_BACKEND }}:staging-${SHA}"   >> "$GITHUB_OUTPUT"
          echo "frontend-tag=${{ env.IMAGE_FRONTEND }}:staging-${SHA}" >> "$GITHUB_OUTPUT"

      - name: build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.backend
          push: true
          tags: |
            ${{ steps.tags.outputs.backend-tag }}
            ${{ env.IMAGE_BACKEND }}:staging-latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.tags.outputs.frontend-tag }}
            ${{ env.IMAGE_FRONTEND }}:staging-latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - id: checksum
        # Forces a pod rollout when ConfigMap or Secret changes — backend
        # deployment carries a `checksum/config: REPLACED_BY_CI` annotation.
        run: |
          CK=$(cat infra/k8s/backend/configmap.yaml infra/k8s/backend/secret.example.yaml \
                | sha256sum | cut -d' ' -f1 | head -c 16)
          echo "cfg-checksum=${CK}" >> "$GITHUB_OUTPUT"

  deploy:
    name: kubectl apply (staging)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.progctf.deadwake.org
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.5

      - name: load kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.STAGING_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context

      - name: patch image tags + checksum
        env:
          BACKEND_TAG:  ${{ needs.build-and-push.outputs.backend-tag }}
          FRONTEND_TAG: ${{ needs.build-and-push.outputs.frontend-tag }}
          CFG_CHK:      ${{ needs.build-and-push.outputs.cfg-checksum }}
        run: |
          set -euo pipefail
          sed -i "s|ghcr.io/deadwake/progctf/backend:.*|${BACKEND_TAG}|"   infra/k8s/backend/deployment.yaml
          sed -i "s|REPLACED_BY_CI|${CFG_CHK}|"                            infra/k8s/backend/deployment.yaml
          sed -i "s|ghcr.io/deadwake/progctf/frontend:.*|${FRONTEND_TAG}|" infra/k8s/frontend/deployment.yaml || true

      - name: apply manifests in launch order
        # Same order as OPERATOR_RUNBOOK.md "Launching The Voyage":
        # namespace -> network policies -> data -> sandbox controller -> backend
        # -> frontend -> edge -> cert-manager -> jobs.
        run: |
          set -euo pipefail
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/network-policies/
          kubectl apply -f infra/k8s/postgres/
          kubectl apply -f infra/k8s/redis/
          kubectl apply -f infra/k8s/minio/
          kubectl apply -f infra/k8s/sandbox-controller/
          kubectl apply -f infra/k8s/backend/
          kubectl apply -f infra/k8s/frontend/
          kubectl apply -f infra/k8s/edge/
          kubectl apply -f infra/k8s/cert-manager/ || true
          kubectl apply -f infra/k8s/jobs/

      - name: wait for backend rollout
        run: kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deploy/backend --timeout=5m

      - name: wait for frontend rollout
        run: kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deploy/frontend --timeout=5m

      - name: smoke — /healthz
        run: |
          set -euo pipefail
          kubectl -n ${{ env.K8S_NAMESPACE }} run smoke-${{ github.run_id }} \
            --image=curlimages/curl:8.10.1 --rm -i --restart=Never --quiet \
            -- curl -fsS --max-time 10 http://backend:4000/healthz

      - name: deploy summary
        if: always()
        run: |
          {
            echo "### Staging deploy"
            echo "- backend:   \`${{ needs.build-and-push.outputs.backend-tag }}\`"
            echo "- frontend:  \`${{ needs.build-and-push.outputs.frontend-tag }}\`"
            echo "- cfg-checksum: \`${{ needs.build-and-push.outputs.cfg-checksum }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
