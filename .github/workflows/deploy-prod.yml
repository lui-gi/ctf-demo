name: deploy-prod

# Production deploy. Triggered by semver tag push (vX.Y.Z) — manual approval
# is gated by GitHub Environment "production" in repo settings. Refuses to
# deploy if The Charts are frozen unless explicitly forced.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semver tag (e.g. v0.3.2) or 'force-frozen' to bypass freeze gate
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/deadwake/progctf/backend
  IMAGE_FRONTEND: ghcr.io/deadwake/progctf/frontend
  K8S_NAMESPACE: progctf-fleet

jobs:

  build-and-push:
    name: build & push prod images
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      backend-tag: ${{ steps.v.outputs.backend-tag }}
      frontend-tag: ${{ steps.v.outputs.frontend-tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: v
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ] && [ "${{ github.event.inputs.tag }}" != "force-frozen" ]; then
            V="${{ github.event.inputs.tag }}"
          else
            V="${GITHUB_REF##refs/tags/}"
          fi
          if ! [[ "$V" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?$ ]]; then
            echo "::error::version $V is not strict semver"
            exit 1
          fi
          echo "version=$V"                                      >> "$GITHUB_OUTPUT"
          echo "backend-tag=${{ env.IMAGE_BACKEND }}:$V"         >> "$GITHUB_OUTPUT"
          echo "frontend-tag=${{ env.IMAGE_FRONTEND }}:$V"       >> "$GITHUB_OUTPUT"

      - name: build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.backend
          push: true
          tags: |
            ${{ steps.v.outputs.backend-tag }}
            ${{ env.IMAGE_BACKEND }}:prod-latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.v.outputs.frontend-tag }}
            ${{ env.IMAGE_FRONTEND }}:prod-latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: trivy CRITICAL gate
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.v.outputs.backend-tag }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

  deploy:
    name: kubectl apply (production, manual approval gate)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://progctf.deadwake.org
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.5

      - name: load prod kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.PROD_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context

      - name: pre-flight — refuse if voyage frozen (unless forced)
        # Once the operator has frozen The Charts to compute final standings,
        # a rolling deploy could clobber the freeze flag. Refuse unless the
        # workflow_dispatch input is "force-frozen".
        run: |
          set -euo pipefail
          STATE=$(kubectl -n ${{ env.K8S_NAMESPACE }} exec deploy/backend -c backend -- \
            curl -fsS http://localhost:4000/admin/voyage/state \
            -H "X-Internal-Probe: 1" 2>/dev/null || echo '{"frozen":false}')
          if echo "$STATE" | grep -q '"frozen":true'; then
            if [ "${{ github.event.inputs.tag }}" != "force-frozen" ]; then
              echo "::error::Voyage is frozen — refusing to deploy. Re-run workflow_dispatch with input 'force-frozen' if you really mean it."
              exit 1
            fi
            echo "::warning::Voyage is frozen but force-frozen was passed — proceeding."
          fi

      - name: patch image tags
        env:
          BACKEND_TAG:  ${{ needs.build-and-push.outputs.backend-tag }}
          FRONTEND_TAG: ${{ needs.build-and-push.outputs.frontend-tag }}
        run: |
          set -euo pipefail
          sed -i "s|ghcr.io/deadwake/progctf/backend:.*|${BACKEND_TAG}|"   infra/k8s/backend/deployment.yaml
          sed -i "s|ghcr.io/deadwake/progctf/frontend:.*|${FRONTEND_TAG}|" infra/k8s/frontend/deployment.yaml || true

      - name: apply (rolling)
        run: |
          set -euo pipefail
          kubectl apply -f infra/k8s/network-policies/
          kubectl apply -f infra/k8s/backend/
          kubectl apply -f infra/k8s/frontend/
          kubectl apply -f infra/k8s/edge/

      - name: wait for backend rollout
        run: kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deploy/backend --timeout=10m

      - name: wait for frontend rollout
        run: kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deploy/frontend --timeout=10m

      - name: auto-rollback on failure
        if: failure()
        run: |
          set -euo pipefail
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout undo deploy/backend
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout undo deploy/frontend
          echo "::error::Prod rollout failed — undo applied. Investigate before re-running."
          exit 1

      - name: deploy summary
        if: success()
        run: |
          {
            echo "### Prod deploy ${{ needs.build-and-push.outputs.version }}"
            echo "- backend:  \`${{ needs.build-and-push.outputs.backend-tag }}\`"
            echo "- frontend: \`${{ needs.build-and-push.outputs.frontend-tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
