name: ci

# CI for The Voyage. Runs on every PR + push to main.
# Blocks merge on failure. See OPERATOR_RUNBOOK.md for what each job does.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  security-events: write   # Trivy SARIF upload

jobs:

  # -----------------------------------------------------------------------
  # Backend — lint, typecheck, vitest, OpenAPI validation.
  # -----------------------------------------------------------------------
  backend:
    name: backend (lint + typecheck + tests + openapi)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm exec tsc --noEmit
      - run: pnpm test
      - name: validate OpenAPI spec
        run: |
          pnpm dlx @redocly/cli@1.25.7 lint openapi.yaml
          pnpm dlx @apidevtools/swagger-cli@4.0.4 validate openapi.yaml

  # -----------------------------------------------------------------------
  # Frontend — lint, typecheck, vitest, build (verifies admin chunk split).
  # -----------------------------------------------------------------------
  frontend:
    name: frontend (lint + typecheck + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm exec tsc --noEmit
      - run: pnpm test
      - run: pnpm build
      - name: verify admin bundle code-split
        run: |
          if ! ls dist/assets/admin-*.js >/dev/null 2>&1; then
            echo "FAIL: admin chunk not split — Helmsman's lazy-load contract is broken."
            ls dist/assets/ || true
            exit 1
          fi
          echo "OK admin-*.js present in dist/assets/"

  # -----------------------------------------------------------------------
  # K8s manifest validation — kubeconform on every YAML under infra/k8s.
  # -----------------------------------------------------------------------
  k8s-manifests:
    name: k8s manifests (kubeconform + network-policy review)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install kubeconform
        run: |
          curl -sSLo kubeconform.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tgz
          sudo install kubeconform /usr/local/bin/
      - name: validate manifests
        run: |
          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            infra/k8s/
      - name: forbid privileged + hostNetwork
        run: |
          set -e
          if grep -RIn --include='*.yaml' -E 'privileged:\s*true|hostNetwork:\s*true' infra/k8s/; then
            echo "FAIL: privileged or hostNetwork found in K8s manifests."
            exit 1
          fi
          echo "OK no privileged / hostNetwork in manifests."
      - name: forbid `latest` image tags
        run: |
          set -e
          if grep -RIn --include='*.yaml' -E 'image:.*:latest(\s|$)' infra/k8s/; then
            echo "FAIL: `:latest` image tag found — pin to semver or digest."
            exit 1
          fi
          echo "OK no :latest image tags."

  # -----------------------------------------------------------------------
  # Image scan — Trivy on the built backend + frontend images.
  # -----------------------------------------------------------------------
  trivy:
    name: trivy image scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: build backend image
        run: docker build -f infra/Dockerfile.backend -t progctf/backend:ci .
      - name: build frontend image
        run: docker build -f infra/Dockerfile.frontend -t progctf/frontend:ci .
      - name: trivy backend
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: progctf/backend:ci
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      - name: trivy frontend
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: progctf/frontend:ci
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      - name: upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./
