openapi: 3.0.3
info:
  title: progctf — The Voyage API
  version: 0.1.0
  description: |
    Pirate-themed CTF backend (Bosun). Player REST API + admin API.
    JWT auth via httpOnly cookie (`progctf_session` for player, `progctf_admin` for admin)
    or `Authorization: Bearer <token>` header.

servers:
  - url: http://localhost:4000
    description: Local dev

tags:
  - name: auth
  - name: crews
  - name: islands
  - name: charts
  - name: admin

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: progctf_session
    adminCookie:
      type: apiKey
      in: cookie
      name: progctf_admin
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    OkResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        message: { type: string }

    ErrorResponse:
      type: object
      required: [ok, code, message]
      properties:
        ok: { type: boolean, example: false }
        code:
          type: string
          enum:
            - ERR_BAD_INPUT
            - ERR_BAD_FORMAT
            - ERR_BAD_CREDENTIALS
            - ERR_PIRATE_EXISTS
            - ERR_BANNED
            - ERR_NO_AUTH
            - ERR_BAD_AUTH
            - ERR_NOT_ADMIN
            - ERR_NO_REFRESH
            - ERR_BAD_REFRESH
            - ERR_NO_CREW
            - ERR_ALREADY_ON_CREW
            - ERR_CREW_NAME_TAKEN
            - ERR_CREW_BANNED
            - ERR_NO_ISLAND
            - ERR_NOT_PUBLISHED
            - ERR_NO_WHISPER
            - ERR_BAD_WHISPER
            - ERR_RATE_LIMITED
            - ERR_ALREADY_PLUNDERED
            - ERR_WRONG_TREASURE
            - ERR_VOYAGE_FROZEN
            - ERR_SLUG_TAKEN
            - ERR_WHISPER_EXISTS
            - ERR_NO_PIRATE
            - ERR_NO_UPDATES
            - ERR_SANDBOX_DOWN
        message: { type: string, example: "That ain't the right Treasure, sailor." }
        retryAfter: { type: integer }

    PirateBrief:
      type: object
      properties:
        id: { type: string, format: uuid }
        handle: { type: string }
        role: { type: string, enum: [pirate, admin] }
        crew_id: { type: string, format: uuid, nullable: true }

    PirateMe:
      type: object
      required: [id, email, handle, role, crew]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        handle: { type: string }
        role: { type: string, enum: [pirate, admin] }
        crew:
          oneOf:
            - type: 'null'
            - type: object
              required: [id, name, flag_emoji]
              properties:
                id: { type: string, format: uuid }
                name: { type: string }
                flag_emoji: { type: string, nullable: true }

    CrewProfile:
      type: object
      required: [id, name, score, members, solved]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        flag_emoji: { type: string, nullable: true }
        score: { type: integer }
        rank: { type: integer, nullable: true }
        members:
          type: array
          items:
            type: object
            properties:
              handle: { type: string }
        solved:
          type: array
          items:
            type: object
            properties:
              island_slug: { type: string }
              island_title: { type: string }
              category: { type: string }
              difficulty: { type: string, enum: [port, open_sea, cursed_depths] }
              awarded_points: { type: integer }
              first_blood: { type: boolean }
              solved_at: { type: string, format: date-time }

    Crew:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        invite_code: { type: string }

    IslandList:
      type: object
      properties:
        slug: { type: string }
        title: { type: string }
        category: { type: string }
        difficulty: { type: string, enum: [port, open_sea, cursed_depths] }
        base_points: { type: integer }
        current_points: { type: integer }
        first_blood_crew: { type: string, nullable: true }
        solves: { type: integer }
        solved: { type: boolean }

    IslandDetail:
      allOf:
        - $ref: '#/components/schemas/IslandList'
        - type: object
          properties:
            description_md: { type: string }
            files_url: { type: string, nullable: true }
            sandbox_image: { type: string, nullable: true }
            solved_by_crew: { type: boolean }
            whispers:
              type: array
              items:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  ordinal: { type: integer }
                  cost_points: { type: integer }
                  revealed: { type: boolean }
                  body_md: { type: string, nullable: true }

    SubmissionAccepted:
      type: object
      properties:
        ok: { type: boolean, example: true }
        awarded: { type: integer }
        baseAward: { type: integer }
        firstBlood: { type: integer }
        currentPoints: { type: integer }
        islandSlug: { type: string }
        islandTitle: { type: string }
        message: { type: string }

    ChartRow:
      type: object
      properties:
        crew_id: { type: string }
        crew_name: { type: string }
        flag_emoji: { type: string, nullable: true }
        points: { type: integer }
        solves: { type: integer }
        last_solve_at: { type: string, format: date-time, nullable: true }

    CrewStanding:
      type: object
      properties:
        crew_id: { type: string }
        crew_name: { type: string }
        points: { type: integer }
        solves: { type: integer }
        rank: { type: integer, nullable: true }
        solved_islands:
          type: array
          items:
            type: object
            properties:
              slug: { type: string }
              title: { type: string }
              points: { type: integer }
              at: { type: string, format: date-time }

paths:
  /health:
    get:
      tags: [auth]
      summary: Liveness check
      responses:
        '200':
          description: ok

  /api/auth/sign-articles:
    post:
      tags: [auth]
      summary: Register a Pirate (rate-limited 10/min/IP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, handle, password]
              properties:
                email: { type: string, format: email }
                handle: { type: string }
                password: { type: string, format: password, minLength: 8 }
      responses:
        '201':
          description: Pirate created and auto-boarded (cookies set)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      pirate: { $ref: '#/components/schemas/PirateBrief' }
        '400': { description: Bad input, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '409': { description: Email or handle taken, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '429': { description: Rate limited }

  /api/auth/board:
    post:
      tags: [auth]
      summary: Login (rate-limited 10/min/IP); JWT issued in httpOnly cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200': { description: Boarded }
        '401': { description: Bad credentials, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '403': { description: Banned }

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: Rotate access + refresh tokens
      responses:
        '200': { description: ok }
        '401': { description: missing/invalid refresh }

  /api/auth/disembark:
    post:
      tags: [auth]
      summary: Logout (clears cookies)
      responses:
        '200': { description: ok }

  /api/auth/me:
    get:
      tags: [auth]
      summary: Identity probe — returns the calling Pirate + Crew (frontend uses this since the JWT is httpOnly)
      security: [{ sessionCookie: [] }, { bearer: [] }]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PirateMe' }
        '401':
          description: missing or invalid auth
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
        '404':
          description: Pirate row no longer exists
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Logout — clears BOTH the player cookie and the admin cookie. Themed alias of /disembark for the frontend.
      security: [{ sessionCookie: [] }, { bearer: [] }]
      responses:
        '200':
          description: cookies cleared
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      message: { type: string, example: "Walked the plank." }
        '401':
          description: missing or invalid auth
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }

  /api/crews/:
    post:
      tags: [crews]
      summary: Create a Crew
      security: [{ sessionCookie: [] }, { bearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                flag_emoji: { type: string }
      responses:
        '201': { description: created }
        '409': { description: name taken / already on crew }

  /api/crews/{name}:
    get:
      tags: [crews]
      summary: Crew profile + members + solved Islands (sorted newest-first)
      security: [{ sessionCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string, minLength: 2, maxLength: 40 }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CrewProfile' }
        '400':
          description: malformed crew name
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
        '404':
          description: no crew with that name
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }

  /api/crews/join:
    post:
      tags: [crews]
      summary: Join a Crew via invite code
      security: [{ sessionCookie: [] }, { bearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invite_code]
              properties:
                invite_code: { type: string }
      responses:
        '200': { description: joined }
        '404': { description: no such crew }

  /api/islands/:
    get:
      tags: [islands]
      summary: |
        List Islands. By default returns only `status='published'` (sanitized — no flag_hash).
        Admins may pass `?include_unpublished=1` to also see drafts and archived. Non-admins
        passing the param get 403 (we do NOT silently ignore — frontend needs to know).
      security: [{ sessionCookie: [] }, { bearer: [] }]
      parameters:
        - in: query
          name: include_unpublished
          required: false
          description: |
            "1" or "true" — admin-only. Includes drafts and archived. 403 for non-admins.
          schema:
            type: string
            enum: ['1', 'true']
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  islands:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/IslandList'
                        - type: object
                          properties:
                            status: { type: string, enum: [draft, published, archived] }
        '403':
          description: non-admin tried to use include_unpublished
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }

  /api/islands/{slug}:
    get:
      tags: [islands]
      summary: Island detail
      security: [{ sessionCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  island: { $ref: '#/components/schemas/IslandDetail' }
        '404': { description: not found / not published }

  /api/islands/{slug}/submit:
    post:
      tags: [islands]
      summary: Submit a Treasure (rate-limited 5/min/Crew/Island)
      security: [{ sessionCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [flag]
              properties:
                flag: { type: string, example: 'progctf{set_sail}' }
      responses:
        '200':
          description: Either correct (SubmissionAccepted) OR wrong-treasure error (still 200)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SubmissionAccepted'
                  - $ref: '#/components/schemas/ErrorResponse'
        '400': { description: malformed }
        '403': { description: no crew }
        '404': { description: no such island / not published }
        '409': { description: already plundered }
        '423': { description: voyage frozen }
        '429':
          description: rate limited
          headers:
            Retry-After:
              schema: { type: integer }

  /api/islands/{slug}/shell:
    get:
      tags: [islands]
      summary: |
        WebSocket — per-Island terminal stub. The HTTP GET shown here is the WS
        upgrade request; clients connect via `ws://.../api/islands/{slug}/shell`
        with the player JWT cookie or `Authorization: Bearer <token>`.

        Phase 1c behaviour: server emits a JSON `banner` frame on connect, then
        for each inbound message replies with a JSON `stdout` frame containing
        `"⚓ shell stub for {slug} — sandbox controller hookup is Phase 2"`.

        Phase 2 will wire each socket to the per-Crew sandbox container managed
        by Shipwright + Powder Monkey.
      security: [{ sessionCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        '101':
          description: WebSocket upgrade accepted
        '401':
          description: missing or invalid auth — upgrade refused
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }

  /api/islands/{slug}/whisper/{n}:
    post:
      tags: [islands]
      summary: Reveal Whisper n (deducts points on next solve)
      security: [{ sessionCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
        - in: path
          name: n
          required: true
          schema: { type: integer, minimum: 1, maximum: 3 }
      responses:
        '200': { description: ok }

  /api/charts/:
    get:
      tags: [charts]
      summary: Top-20 Crews snapshot
      security: [{ sessionCookie: [] }, { bearer: [] }]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  charts:
                    type: array
                    items: { $ref: '#/components/schemas/ChartRow' }

  /api/charts/me:
    get:
      tags: [charts]
      summary: My Crew's standing
      security: [{ sessionCookie: [] }, { bearer: [] }]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  standing: { $ref: '#/components/schemas/CrewStanding' }

  # ---------------------------- ADMIN ----------------------------

  /admin/islands/:
    post:
      tags: [admin]
      summary: Create Island
      security: [{ adminCookie: [] }, { bearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, title, category, difficulty, description_md, base_points, flag]
              properties:
                slug: { type: string }
                title: { type: string }
                category: { type: string, enum: [cursed_ports, cipher_cove, shipwrights_forge, lighthouse, crows_nest, hidden_cargo, keymaster] }
                difficulty: { type: string, enum: [port, open_sea, cursed_depths] }
                description_md: { type: string }
                base_points: { type: integer, minimum: 50, maximum: 900 }
                flag: { type: string, pattern: '^progctf\{[a-z0-9_]+\}$' }
                files_url: { type: string, nullable: true }
                sandbox_image: { type: string, nullable: true }
                status: { type: string, enum: [draft, published, archived], default: draft }
      responses:
        '201': { description: created }
        '409': { description: slug taken }

  /admin/islands/{id}:
    patch:
      tags: [admin]
      summary: Edit Island (any subset of fields)
      security: [{ adminCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: updated }
        '404': { description: not found }
    delete:
      tags: [admin]
      summary: Delete Island
      security: [{ adminCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: scuttled }

  /admin/islands/{id}/files:
    post:
      tags: [admin]
      summary: Set the object-storage prefix for challenge files
      security: [{ adminCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [files_url]
              properties:
                files_url: { type: string, format: uri }
      responses:
        '200': { description: ok }

  /admin/islands/{id}/status:
    patch:
      tags: [admin]
      summary: Set Island status (draft / published / archived)
      security: [{ adminCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [draft, published, archived] }
      responses:
        '200': { description: ok }

  /admin/islands/{id}/whispers:
    post:
      tags: [admin]
      summary: Add a Whisper
      security: [{ adminCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ordinal, body_md, cost_points]
              properties:
                ordinal: { type: integer, minimum: 1, maximum: 3 }
                body_md: { type: string }
                cost_points: { type: integer, minimum: 0 }
      responses:
        '201': { description: created }
        '409': { description: whisper exists at that ordinal }

  /admin/islands/{id}/stats:
    get:
      tags: [admin]
      summary: Island stats — solves, attempts, first blood
      security: [{ adminCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: ok }

  /admin/sandbox/{id}/rebuild:
    post:
      tags: [admin]
      summary: Rebuild challenge container (proxies to Shipwright controller)
      security: [{ adminCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: ok }
        '502': { description: controller unreachable }

  /admin/charts/recalc:
    post:
      tags: [admin]
      summary: Force-recalc + flush Charts cache
      security: [{ adminCookie: [] }, { bearer: [] }]
      responses:
        '200': { description: ok }

  /admin/crews/{id}/ban:
    post:
      tags: [admin]
      summary: Ban a Crew
      security: [{ adminCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: ok }

  /admin/crews/{id}/unban:
    post:
      tags: [admin]
      summary: Un-ban a Crew
      security: [{ adminCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: ok }

  /admin/pirates/{id}/ban:
    post:
      tags: [admin]
      summary: Ban a Pirate
      security: [{ adminCookie: [] }, { bearer: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: ok }

  /admin/submissions:
    get:
      tags: [admin]
      summary: Submission log (filterable)
      security: [{ adminCookie: [] }, { bearer: [] }]
      parameters:
        - in: query
          name: island_id
          schema: { type: string, format: uuid }
        - in: query
          name: crew_id
          schema: { type: string, format: uuid }
        - in: query
          name: pirate_id
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200': { description: ok }

  /admin/audit:
    get:
      tags: [admin]
      summary: Recent admin audit entries
      security: [{ adminCookie: [] }, { bearer: [] }]
      responses:
        '200': { description: ok }

  /admin/voyage/:
    get:
      tags: [admin]
      summary: Current voyage state (frozen?)
      security: [{ adminCookie: [] }, { bearer: [] }]
      responses:
        '200': { description: ok }

  /admin/voyage/freeze:
    post:
      tags: [admin]
      summary: Freeze The Charts (no submissions accepted)
      security: [{ adminCookie: [] }, { bearer: [] }]
      responses:
        '200': { description: ok }

  /admin/voyage/unfreeze:
    post:
      tags: [admin]
      summary: Unfreeze
      security: [{ adminCookie: [] }, { bearer: [] }]
      responses:
        '200': { description: ok }
