# nginx frontend SPA serve config — used by infra/Dockerfile.frontend.
# This config does NOT terminate TLS or proxy to the backend; the edge
# nginx (infra/nginx/edge.conf) handles both. This file just ships static
# assets from the React build.

server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Standard SPA fallback — anything that isn't a real file goes to
    # index.html so React Router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets (Vite emits content-hashed filenames) — cache aggressively.
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Never cache the entrypoint — clients must always re-validate to pick
    # up new bundle hashes after a deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Health probe for K8s liveness/readiness.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Security: refuse to serve hidden files.
    location ~ /\.(?!well-known) {
        deny all;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
