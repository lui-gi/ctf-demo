# Common reverse-proxy headers — included by every location in edge.conf.
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

# JWT lives in HttpOnly cookies set by Bosun's /api/auth/board route.
# Pass through unchanged — DO NOT strip Cookie or Set-Cookie.
proxy_pass_request_headers on;
proxy_pass_header Set-Cookie;

# Sensible timeouts (long-poll / WebSocket overrides this in their block).
proxy_connect_timeout 5s;
proxy_send_timeout    30s;
proxy_read_timeout    30s;

# Don't let a slow upstream tie up edge workers forever.
proxy_buffering on;
proxy_buffers 16 8k;
proxy_busy_buffers_size 16k;
