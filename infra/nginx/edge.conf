# =========================================================================
# Edge nginx — the auth gateway / reverse proxy that fronts The Voyage.
#
# Responsibilities:
#   * Terminate TLS (in prod; cert-manager provides cert/key).
#   * Rate-limit the noisy / abuse-prone routes (auth, submit).
#   * Set strict CSP + standard hardening headers on every response.
#   * Pass JWT cookies through to the backend untouched.
#   * Route:  /api/*       -> backend (Bosun)
#             /socket.io/* -> backend WebSocket
#             /*           -> frontend static (Helmsman)
#
# This file is mounted into the docker-compose `edge` service AND the
# K8s `edge` Deployment. Anything env-specific (server_name, TLS paths)
# lives in K8s ConfigMap overlays — keep this file portable.
# =========================================================================

# ---- Rate-limit zones -----------------------------------------------------
# Auth endpoints: per-IP, 10 req/min — protects the Sign Articles / Board
# pages from credential stuffing. Tripping this fires the
# `CrewIsRiotingBoardingTheAuthEndpoint` Prometheus alert.
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

# Submission endpoint: per-IP soft throttle. The hard per-Crew/per-Island
# limit lives inside Bosun's flag-validator (Redis-backed), but this is a
# DDoS shield on the edge.
limit_req_zone $binary_remote_addr zone=submit_zone:10m rate=30r/m;

# General API throttle. Generous — real client traffic shouldn't hit it.
limit_req_zone $binary_remote_addr zone=api_zone:20m rate=120r/m;

# Connection cap per IP for WebSocket fan-out.
limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

# ---- Upstreams ------------------------------------------------------------
upstream backend_upstream {
    # In docker-compose: service name. In K8s: Service DNS name.
    server backend:4000 max_fails=3 fail_timeout=15s;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:8080 max_fails=3 fail_timeout=15s;
    keepalive 16;
}

# ---- WebSocket upgrade map ------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Hide nginx version in headers / errors.
    server_tokens off;

    # Strict request size — flag submissions are tiny; 1MB is generous.
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # ---- Security headers (apply to every response) -----------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # CSP — strict, no inline JS. The frontend MUST not use inline scripts;
    # Vite produces hashed external bundles which match 'self'.
    # 'frame-src self' covers the xterm.js terminal iframe at /terminal.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    limit_conn conn_zone 50;

    # ---- Health probe (K8s) ----------------------------------------------
    location = /healthz {
        access_log off;
        return 200 "edge-ok\n";
        add_header Content-Type text/plain;
    }

    # ---- Auth endpoints: tight per-IP throttle ---------------------------
    location ~ ^/api/auth/(sign-articles|board)$ {
        limit_req zone=auth_zone burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend_upstream;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    # ---- Submission endpoint: edge throttle as DDoS shield ---------------
    location ~ ^/api/islands/[^/]+/submit$ {
        limit_req zone=submit_zone burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://backend_upstream;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    # ---- Other API routes ------------------------------------------------
    location /api/ {
        limit_req zone=api_zone burst=40 nodelay;
        proxy_pass http://backend_upstream;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    # ---- WebSocket (Socket.io) ------------------------------------------
    location /socket.io/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    # ---- Static frontend SPA --------------------------------------------
    location / {
        proxy_pass http://frontend_upstream;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}
