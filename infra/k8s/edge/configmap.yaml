---
# Edge nginx config materialized from infra/nginx/edge.conf and
# infra/nginx/snippets/proxy-common.conf. CI re-renders this ConfigMap
# from the source files (kustomize / helm template) on every deploy so
# the source-of-truth stays in /infra/nginx/.
apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-config
  namespace: progctf-fleet
  labels:
    app.kubernetes.io/name: edge
data:
  edge.conf: |
    # Mirror of infra/nginx/edge.conf — CI keeps these in sync.
    # See that file for full annotated config. Inlined here so the
    # ConfigMap is self-contained for `kubectl apply -k`.
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=submit_zone:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:20m rate=120r/m;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    upstream backend_upstream  { server backend.progctf-fleet.svc.cluster.local:4000  max_fails=3 fail_timeout=15s; keepalive 32; }
    upstream frontend_upstream { server frontend.progctf-fleet.svc.cluster.local:8080 max_fails=3 fail_timeout=15s; keepalive 16; }

    map $http_upgrade $connection_upgrade { default upgrade; '' close; }

    server {
      listen 80 default_server;
      server_name _;
      server_tokens off;
      client_max_body_size 1m;

      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

      limit_conn conn_zone 50;

      location = /healthz { access_log off; return 200 "edge-ok\n"; add_header Content-Type text/plain; }

      location ~ ^/api/auth/(sign-articles|board)$ {
        limit_req zone=auth_zone burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend_upstream;
        include /etc/nginx/snippets/proxy-common.conf;
      }
      location ~ ^/api/islands/[^/]+/submit$ {
        limit_req zone=submit_zone burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://backend_upstream;
        include /etc/nginx/snippets/proxy-common.conf;
      }
      location /api/ {
        limit_req zone=api_zone burst=40 nodelay;
        proxy_pass http://backend_upstream;
        include /etc/nginx/snippets/proxy-common.conf;
      }
      location /socket.io/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        include /etc/nginx/snippets/proxy-common.conf;
      }
      location / {
        proxy_pass http://frontend_upstream;
        include /etc/nginx/snippets/proxy-common.conf;
      }
    }

  proxy-common.conf: |
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_pass_request_headers on;
    proxy_pass_header Set-Cookie;
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    proxy_buffering on;
    proxy_buffers 16 8k;
    proxy_busy_buffers_size 16k;
