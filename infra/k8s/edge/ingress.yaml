---
# Public-facing ingress. cert-manager mints + rotates the TLS cert from
# Let's Encrypt. See infra/k8s/cert-manager/ for the issuers.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edge
  namespace: progctf-fleet
  labels:
    app.kubernetes.io/name: edge
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Rate limiting at the cluster ingress is belt-and-braces in front of
    # the edge nginx Deployment.
    nginx.ingress.kubernetes.io/limit-rpm: "600"
    nginx.ingress.kubernetes.io/limit-connections: "100"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - progctf.example.com
      secretName: progctf-tls
  rules:
    - host: progctf.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: edge
                port:
                  number: 80
