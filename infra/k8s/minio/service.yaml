---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: progctf-fleet
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-store
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
    - name: console
      port: 9001
      targetPort: console
