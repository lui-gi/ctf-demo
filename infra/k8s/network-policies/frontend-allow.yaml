---
# Helmsman's frontend serves static files. It accepts ingress from edge
# only and has NO egress — it never makes server-side calls.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-allow
  namespace: progctf-fleet
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: edge
      ports:
        - protocol: TCP
          port: 8080
  # Egress: empty == deny-all (DNS still allowed via the sibling allow-dns
  # policy). Static-file nginx never needs to dial out.
  egress: []
