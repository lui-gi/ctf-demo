---
# Bosun's backend can:
#   * accept ingress from edge only
#   * egress to postgres, redis, minio, sandbox-controller (all in-namespace)
# Nothing else. No public internet reach from the API tier.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow
  namespace: progctf-fleet
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: backend
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: edge
      ports:
        - protocol: TCP
          port: 4000
    # Allow Prometheus to scrape /metrics from the monitoring namespace.
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: monitoring }
      ports:
        - protocol: TCP
          port: 4000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports: [{ protocol: TCP, port: 5432 }]
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports: [{ protocol: TCP, port: 6379 }]
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - { protocol: TCP, port: 9000 }
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: sandbox-controller
      ports: [{ protocol: TCP, port: 8080 }]
