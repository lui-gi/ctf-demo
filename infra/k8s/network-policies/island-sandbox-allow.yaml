---
# =========================================================================
# CRITICAL SECURITY RULE.
#
# Island sandbox containers (in `progctf-sandboxes`) MUST NOT be able to
# reach the public internet. They get:
#
#   * Ingress from the edge / sandbox-controller in `progctf-fleet` only.
#   * Egress to DNS (covered by the sibling allow-dns policy) and
#     intra-pod loopback only — nothing leaves the sandbox.
#
# This stops a Crew from converting a popped Island into a pivot to scan
# the cluster, exfil secrets, or attack other infrastructure.
#
# Per-Island policies (one per slug, generated by the sandbox-controller
# in Phase 2) MAY add narrow egress to a sibling sandbox pod when the
# challenge requires inter-container comms (e.g. a vulnerable web app
# that talks to its own internal DB). They MUST NOT broaden egress to
# any external CIDR.
# =========================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: island-sandbox-allow
  namespace: progctf-sandboxes
spec:
  # Match every pod with the sandbox label — the sandbox-controller
  # stamps this on every Island it spawns.
  podSelector:
    matchLabels:
      app.kubernetes.io/component: island-sandbox
  policyTypes: [Ingress, Egress]
  ingress:
    # Only the edge gateway and the sandbox-controller can reach Island pods.
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: progctf-fleet }
          podSelector:
            matchLabels:
              app.kubernetes.io/name: edge
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: progctf-fleet }
          podSelector:
            matchLabels:
              app.kubernetes.io/name: sandbox-controller
  # Egress: explicitly empty. No pod selector listed == deny-all.
  # DNS resolution is allowed by the sibling allow-dns policy.
  # NO entries for the public internet, NO entries for cross-namespace
  # traffic into progctf-fleet. If a specific Island needs intra-namespace
  # talk between its own pods (rare), the sandbox-controller emits a
  # narrowly-scoped per-slug NetworkPolicy alongside this baseline.
  egress: []
