---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: progctf-fleet
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: data
spec:
  type: ClusterIP
  clusterIP: None  # headless — required for StatefulSet stable DNS
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: pg
      port: 5432
      targetPort: pg
