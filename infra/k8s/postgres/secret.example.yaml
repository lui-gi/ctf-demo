---
# EXAMPLE ONLY — do NOT commit a real Secret with values. In prod we
# manage this with Sealed Secrets (bitnami) or external-secrets-operator
# pulling from Vault. Operators apply this file with real base64'd
# values out-of-band, or use:
#   kubectl -n progctf-fleet create secret generic postgres-credentials \
#     --from-literal=username=progctf \
#     --from-literal=password="$(openssl rand -base64 32)" \
#     --from-literal=database=progctf
#
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: progctf-fleet
type: Opaque
stringData:
  username: progctf
  password: REPLACE_AT_DEPLOY_TIME
  database: progctf
