---
# EXAMPLE ONLY — manage real values via Sealed Secrets / Vault.
# Generate with:
#   kubectl -n progctf-fleet create secret generic backend-secrets \
#     --from-literal=DB_URL="postgres://progctf:$(...)@postgres:5432/progctf" \
#     --from-literal=REDIS_URL="redis://redis:6379" \
#     --from-literal=JWT_SECRET="$(openssl rand -base64 64)" \
#     --from-literal=ARGON2_PEPPER="$(openssl rand -base64 32)" \
#     --from-literal=SANDBOX_CONTROLLER_TOKEN="$(openssl rand -base64 32)" \
#     --from-literal=OBJECT_STORE_ACCESS_KEY=progctf \
#     --from-literal=OBJECT_STORE_SECRET_KEY="$(...)"
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: progctf-fleet
type: Opaque
stringData:
  DB_URL: REPLACE_AT_DEPLOY_TIME
  REDIS_URL: REPLACE_AT_DEPLOY_TIME
  JWT_SECRET: REPLACE_AT_DEPLOY_TIME
  ARGON2_PEPPER: REPLACE_AT_DEPLOY_TIME
  SANDBOX_CONTROLLER_TOKEN: REPLACE_AT_DEPLOY_TIME
  OBJECT_STORE_ACCESS_KEY: REPLACE_AT_DEPLOY_TIME
  OBJECT_STORE_SECRET_KEY: REPLACE_AT_DEPLOY_TIME
