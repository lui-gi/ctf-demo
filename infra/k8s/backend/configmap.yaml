---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: progctf-fleet
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
data:
  NODE_ENV: "production"
  HOST: "0.0.0.0"
  PORT: "4000"
  JWT_EXPIRES_IN: "8h"
  JWT_REFRESH_EXPIRES_IN: "30d"
  CORS_ORIGINS: "https://progctf.example.com"
  COOKIE_DOMAIN: "progctf.example.com"
  COOKIE_SECURE: "true"
  SANDBOX_CONTROLLER_URL: "http://sandbox-controller.progctf-fleet.svc.cluster.local:8080"
  CHARTS_CACHE_TTL: "5"
  SUBMIT_RATE_PER_MIN: "5"
  AUTH_RATE_PER_MIN: "10"
  OBJECT_STORE_ENDPOINT: "http://minio.progctf-fleet.svc.cluster.local:9000"
  OBJECT_STORE_REGION: "us-east-1"
  OBJECT_STORE_BUCKET_FILES: "progctf-files"
  OBJECT_STORE_BUCKET_BACKUPS: "progctf-backups"
