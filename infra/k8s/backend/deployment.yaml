---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: progctf-fleet
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: the-voyage
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
      annotations:
        # Forces pod rollout when ConfigMap or Secret rotates.
        # CI/CD writes a checksum here at deploy time.
        checksum/config: "REPLACED_BY_CI"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          # Pinned to semver in CI — never `latest`. CI deploy step rewrites
          # this tag to the freshly-built image digest.
          image: ghcr.io/deadwake/progctf/backend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - configMapRef: { name: backend-config }
          env:
            - name: DB_URL
              valueFrom: { secretKeyRef: { name: backend-secrets, key: DB_URL } }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: backend-secrets, key: REDIS_URL } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: backend-secrets, key: JWT_SECRET } }
            - name: ARGON2_PEPPER
              valueFrom: { secretKeyRef: { name: backend-secrets, key: ARGON2_PEPPER } }
            - name: SANDBOX_CONTROLLER_TOKEN
              valueFrom: { secretKeyRef: { name: backend-secrets, key: SANDBOX_CONTROLLER_TOKEN } }
            - name: OBJECT_STORE_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: backend-secrets, key: OBJECT_STORE_ACCESS_KEY } }
            - name: OBJECT_STORE_SECRET_KEY
              valueFrom: { secretKeyRef: { name: backend-secrets, key: OBJECT_STORE_SECRET_KEY } }
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
