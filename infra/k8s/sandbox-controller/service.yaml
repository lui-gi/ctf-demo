---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-controller
  namespace: progctf-fleet
  labels:
    app.kubernetes.io/name: sandbox-controller
    app.kubernetes.io/component: orchestrator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sandbox-controller
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
