---
# =========================================================================
# sandbox-controller — STUB (Phase 1).
#
# Reconciliation contract (the real implementation lands in Phase 2):
#
#   * Watch ConfigMaps labeled `progctf.deadwake/island-config=true`
#     in `progctf-fleet` — each contains a single `island.yaml` that
#     conforms to the schema in infra/island-template/island.yaml.example.
#   * For `isolation: shared` Islands, ensure exactly one Deployment
#     + Service per slug exists in the `progctf-sandboxes` namespace.
#   * For `isolation: per_crew` Islands, lazily spawn one
#     Deployment + Service per (slug, crew_id) on first request, and
#     reap any pair that has been idle > island.ttl_idle_minutes.
#   * Resolve `secret://island-flags/<slug>` env values from the
#     `island-flags` Secret in `progctf-sandboxes` at pod-create time.
#   * Stamp every spawned pod with the `island-sandbox-allow` NetworkPolicy
#     (no public egress, ingress from edge only) and the resource limits
#     from island.yaml.resources.
#   * Expose:
#       POST /sandbox/:island_id/rebuild        (called by Bosun's admin API)
#       POST /sandbox/:island_id/spawn?crew_id= (called by Bosun on first hit)
#       DELETE /sandbox/:island_id/:crew_id     (idle-reap path)
#       GET  /healthz
#       GET  /metrics                            (Prometheus scrape)
#   * Authenticate inbound requests with the bearer token in the
#     `sandbox-controller-token` Secret (matches Bosun's
#     SANDBOX_CONTROLLER_TOKEN env).
#
# Until that lands, this stub returns 501 to every non-health route so
# Bosun's admin API has a stable target it can call without crashing.
# =========================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-controller
  namespace: progctf-fleet
  labels:
    app.kubernetes.io/name: sandbox-controller
    app.kubernetes.io/component: orchestrator
    app.kubernetes.io/part-of: the-voyage
spec:
  replicas: 1   # singleton — leader-elected when the real impl arrives
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandbox-controller
        app.kubernetes.io/component: orchestrator
    spec:
      serviceAccountName: sandbox-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: stub
          # STUB. Replaced in Phase 2 with the real controller image
          # ghcr.io/deadwake/progctf/sandbox-controller:<semver>.
          image: nginx:1.27.3-alpine@sha256:fb39280b7b9eba5727c884a3c7810002e69e8f961cc373b89c92f1f1d1f63f6a
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat > /etc/nginx/conf.d/default.conf <<'EOF'
              server {
                listen 8080;
                location = /healthz { access_log off; return 200 "ok\n"; }
                location = /metrics { access_log off; return 200 "# stub controller — no metrics yet\n"; add_header Content-Type text/plain; }
                location / {
                  return 501 "sandbox-controller stub — Phase 2 deliverable. See infra/k8s/sandbox-controller/deployment.yaml header.\n";
                  add_header Content-Type text/plain;
                }
              }
              EOF
              exec nginx -g 'daemon off;'
          resources:
            requests: { cpu: "50m",  memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
