---
# Nightly Postgres dump -> MinIO/S3. 14-day retention is enforced via the
# bucket lifecycle policy, NOT the job — so a missed cleanup run can't
# pile up storage. See infra/k8s/jobs/minio-lifecycle.yaml.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: progctf-fleet
  labels:
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/component: backup
spec:
  schedule: "0 2 * * *"   # 02:00 UTC daily
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 7
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-backup
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: dump
              # Postgres client (pg_dump) + mc (MinIO/S3 client) in one shot.
              image: bitnami/postgresql:16.4.0-debian-12-r10@sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
              imagePullPolicy: IfNotPresent
              env:
                - name: PGHOST
                  value: postgres.progctf-fleet.svc.cluster.local
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  valueFrom: { secretKeyRef: { name: postgres-credentials, key: username } }
                - name: PGPASSWORD
                  valueFrom: { secretKeyRef: { name: postgres-credentials, key: password } }
                - name: PGDATABASE
                  valueFrom: { secretKeyRef: { name: postgres-credentials, key: database } }
                - name: S3_ENDPOINT
                  value: http://minio.progctf-fleet.svc.cluster.local:9000
                - name: S3_BUCKET
                  value: progctf-backups
                - name: S3_ACCESS_KEY
                  valueFrom: { secretKeyRef: { name: minio-credentials, key: rootUser } }
                - name: S3_SECRET_KEY
                  valueFrom: { secretKeyRef: { name: minio-credentials, key: rootPassword } }
              command: ["/bin/bash", "-euo", "pipefail", "-c"]
              args:
                - |
                  set -x
                  TS="$(date -u +%Y%m%dT%H%M%SZ)"
                  OUT="/tmp/progctf_${TS}.sql.gz"
                  pg_dump --format=custom --compress=9 --no-owner --no-privileges \
                    | gzip -9 > "${OUT}"
                  ls -lh "${OUT}"

                  # Install mc on demand (no extra image rebuild needed).
                  curl -fsSLo /tmp/mc https://dl.min.io/client/mc/release/linux-amd64/mc
                  chmod +x /tmp/mc
                  /tmp/mc alias set s3 "${S3_ENDPOINT}" "${S3_ACCESS_KEY}" "${S3_SECRET_KEY}"
                  /tmp/mc cp "${OUT}" "s3/${S3_BUCKET}/postgres/progctf_${TS}.sql.gz"

                  # Verify it lands.
                  /tmp/mc stat "s3/${S3_BUCKET}/postgres/progctf_${TS}.sql.gz"
                  echo "backup OK at ${TS}"
              resources:
                requests: { cpu: "200m", memory: "256Mi" }
                limits:   { cpu: "1000m", memory: "1Gi" }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 4Gi
