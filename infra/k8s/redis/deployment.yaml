---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: progctf-fleet
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: the-voyage
spec:
  replicas: 1
  strategy:
    type: Recreate    # single-replica cache; rolling would split traffic mid-eviction
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7.4-alpine@sha256:1e6f1b6c9d7a7d8c5d1e1c8f8d2e6a3b5c0d2e1f4a3b5c7d9e1f2a4b6c8d0e2f
          imagePullPolicy: IfNotPresent
          args:
            - "redis-server"
            - "--save"
            - "60"
            - "1"
            - "--loglevel"
            - "warning"
            - "--maxmemory"
            - "512mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          readinessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
