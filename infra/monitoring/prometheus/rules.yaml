---
# Prometheus alerting rules — themed names per Shipwright spec.
# Loaded as a PrometheusRule CR by kube-prometheus-stack.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: the-voyage
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: the-voyage
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    # -------------------------------------------------------------------
    - name: the-voyage.platform
      interval: 30s
      rules:
        - alert: CrewIsRiotingBoardingTheAuthEndpoint
          # Edge nginx 429s on /api/auth/* spike — credential stuffing or
          # a broken Crew client. Page the operator if sustained.
          expr: |
            sum(rate(nginx_http_requests_total{status="429", path=~"/api/auth/.*"}[2m])) > 1
          for: 3m
          labels:
            severity: warning
            voyage_role: edge
          annotations:
            summary: "Auth endpoint rate-limit tripping"
            description: "Edge is returning 429 to /api/auth/* at {{ $value }} req/s for 3m+. Likely credential stuffing or broken client."
            runbook_url: "https://github.com/deadwake/progctf/blob/main/OPERATOR_RUNBOOK.md#crewisrioting"

        - alert: ChartsBecalmed
          # Redis lag — The Charts cache is stale > 10s. Cache writes are
          # Bosun's responsibility (5s TTL) so 10s without an update
          # means either Redis is sick or the scoring engine wedged.
          expr: |
            (time() - max(progctf_charts_cache_last_write_seconds)) > 10
          for: 2m
          labels:
            severity: critical
            voyage_role: backend
          annotations:
            summary: "The Charts cache hasn't refreshed in {{ $value }}s"
            description: "Redis or the scoring engine has stopped writing charts.* keys. Players will see stale standings."
            runbook_url: "https://github.com/deadwake/progctf/blob/main/OPERATOR_RUNBOOK.md#chartsbecalmed"

        - alert: LandlubberSubmissionsSpike
          # Submission rate > 3x the 1h baseline. Either a Crew is
          # brute-forcing or a popular Island just dropped — either way
          # the operator should look.
          expr: |
            sum(rate(progctf_submissions_total[5m]))
              > 3 * (sum(rate(progctf_submissions_total[1h] offset 5m)) or vector(0.01))
          for: 5m
          labels:
            severity: warning
            voyage_role: backend
          annotations:
            summary: "Submission rate is {{ $value }} req/s — 3x the baseline"
            description: "Sudden surge in flag submissions. Check /admin/submissions for a single Crew brute-forcing one Island."
            runbook_url: "https://github.com/deadwake/progctf/blob/main/OPERATOR_RUNBOOK.md#landlubbersubmissions"

        - alert: BackendErrorRate
          expr: |
            sum(rate(http_requests_total{namespace="progctf-fleet", app_kubernetes_io_name="backend", status=~"5.."}[5m]))
              / sum(rate(http_requests_total{namespace="progctf-fleet", app_kubernetes_io_name="backend"}[5m]))
              > 0.02
          for: 5m
          labels:
            severity: warning
            voyage_role: backend
          annotations:
            summary: "Backend 5xx rate {{ $value | humanizePercentage }}"
            description: "Backend is returning 5xx on >2% of requests for 5m+."

        - alert: BackendHighLatencyP95
          expr: |
            histogram_quantile(0.95,
              sum by (le) (rate(http_request_duration_seconds_bucket{namespace="progctf-fleet", app_kubernetes_io_name="backend"}[5m]))
            ) > 1.0
          for: 5m
          labels:
            severity: warning
            voyage_role: backend
          annotations:
            summary: "Backend P95 latency {{ $value }}s"
            description: "Bosun's API P95 is over 1s for 5m+."

    # -------------------------------------------------------------------
    - name: the-voyage.sandboxes
      interval: 30s
      rules:
        - alert: IslandSandboxAdrift
          # An Island sandbox has been unhealthy > 3 minutes. Players on
          # that Island will be unable to make progress — investigate or
          # rebuild via /admin/sandbox/:id/rebuild.
          expr: |
            max by (slug) (island_sandbox_unhealthy) > 0
          for: 3m
          labels:
            severity: warning
            voyage_role: sandbox
          annotations:
            summary: "Island {{ $labels.slug }} is adrift"
            description: "Sandbox-controller reports {{ $labels.slug }} unhealthy for 3m+. Try rebuild via the admin panel."
            runbook_url: "https://github.com/deadwake/progctf/blob/main/OPERATOR_RUNBOOK.md#islandsandboxadrift"

        - alert: SandboxSpawnRejectionsClimbing
          expr: |
            sum(rate(sandbox_spawn_rejected_total[10m])) > 0.1
          for: 10m
          labels:
            severity: warning
            voyage_role: sandbox
          annotations:
            summary: "Sandbox-controller is rejecting spawns ({{ $value }}/s)"
            description: "Reasons: {{ $labels.reason }}. Likely a malformed island.yaml or a security-rule violation."

    # -------------------------------------------------------------------
    - name: the-voyage.data
      interval: 30s
      rules:
        - alert: PostgresDown
          expr: up{job=~".*postgres.*", namespace="progctf-fleet"} == 0
          for: 2m
          labels:
            severity: critical
            voyage_role: data
          annotations:
            summary: "Postgres is down"
            description: "All submissions / score writes are blocked."

        - alert: PostgresBackupMissedYesterday
          # Backup CronJob runs at 02:00 UTC. If we don't see a successful
          # job in the last 26h, alert.
          expr: |
            (time() - max(kube_job_status_completion_time{namespace="progctf-fleet", job_name=~"postgres-backup.*"})) > 93600
          for: 30m
          labels:
            severity: critical
            voyage_role: data
          annotations:
            summary: "No successful Postgres backup in 26h+"
            description: "Run the on-demand backup or investigate the CronJob."
            runbook_url: "https://github.com/deadwake/progctf/blob/main/OPERATOR_RUNBOOK.md#backups"

        - alert: RedisDown
          expr: up{job=~".*redis.*", namespace="progctf-fleet"} == 0
          for: 2m
          labels:
            severity: critical
            voyage_role: data
          annotations:
            summary: "Redis is down — sessions + Charts cache offline"
