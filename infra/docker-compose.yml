# =========================================================================
# The Voyage — local-dev compose file.
#
# `docker compose -f infra/docker-compose.yml up` boots the whole stack on a
# developer laptop: postgres + redis + minio + backend + frontend + edge.
#
# Secrets: this file uses ${VAR:?required} interpolation. Copy
# infra/docker-compose.override.yml.example -> docker-compose.override.yml
# and fill in dev-only secrets there. Compose merges the override
# automatically when present.
#
# Network policy enforcement is K8s-only — for local dev we lean on a single
# bridge network (`progctf-fleet-net`) and the Bosun/edge-side rate limits.
# =========================================================================

name: progctf

networks:
  progctf-fleet-net:
    driver: bridge
    name: progctf-fleet-net

volumes:
  postgres-data:
    name: progctf-postgres-data
  minio-data:
    name: progctf-minio-data
  redis-data:
    name: progctf-redis-data

services:

  # -----------------------------------------------------------------------
  # Postgres — primary OLTP store. Migrations live in /db/migrations and are
  # applied at first boot via the official entrypoint init mount.
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:16.4-alpine@sha256:f1f7d8b34efe5a6e5a3b0c1baf3a3a1d3a0d3c6f94e5d3e9bb0f6a7b3a5b7c8d
    container_name: progctf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-progctf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
      POSTGRES_DB: ${POSTGRES_DB:-progctf}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-progctf} -d ${POSTGRES_DB:-progctf}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [progctf-fleet-net]
    # Postgres only listens on the internal network. No host port published
    # in the committed config — devs that want psql access use the override.

  # -----------------------------------------------------------------------
  # Redis — sessions + The Charts cache (5s TTL, Bosun owns the keys).
  # -----------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine@sha256:1e6f1b6c9d7a7d8c5d1e1c8f8d2e6a3b5c0d2e1f4a3b5c7d9e1f2a4b6c8d0e2f
    container_name: progctf-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [progctf-fleet-net]

  # -----------------------------------------------------------------------
  # MinIO — S3-compatible object storage for challenge files and Postgres
  # backups. Bucket `progctf-files` and `progctf-backups` are auto-created
  # by the `minio-init` one-shot below.
  # -----------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z@sha256:eebdfbe2cc1e0a0f5b3d1d2eaabe5d8b2e6e1ef0e2c1c8d4d4e4d4e4e4e4e4e4
    container_name: progctf-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?minio root user required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?minio root password required}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [progctf-fleet-net]
    # Console + S3 API only published in dev override — keep host clean by
    # default.

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z@sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
    container_name: progctf-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/progctf-files &&
      mc mb --ignore-existing local/progctf-backups &&
      mc anonymous set none local/progctf-files &&
      mc anonymous set none local/progctf-backups &&
      echo 'minio buckets ready'
      "
    networks: [progctf-fleet-net]
    restart: "no"

  # -----------------------------------------------------------------------
  # Backend — Bosun's Fastify API + WebSocket + scoring engine.
  # -----------------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    image: progctf/backend:dev
    container_name: progctf-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 4000
      DB_URL: postgres://${POSTGRES_USER:-progctf}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-progctf}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?jwt secret required}
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_EXPIRES_IN: 30d
      ARGON2_PEPPER: ${ARGON2_PEPPER:?argon2 pepper required}
      CORS_ORIGINS: http://localhost:8080,http://localhost
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: "false"
      SANDBOX_CONTROLLER_URL: http://sandbox-controller:8080
      SANDBOX_CONTROLLER_TOKEN: ${SANDBOX_CONTROLLER_TOKEN:?required}
      CHARTS_CACHE_TTL: "5"
      SUBMIT_RATE_PER_MIN: "5"
      AUTH_RATE_PER_MIN: "10"
      OBJECT_STORE_ENDPOINT: http://minio:9000
      OBJECT_STORE_REGION: us-east-1
      OBJECT_STORE_BUCKET_FILES: progctf-files
      OBJECT_STORE_BUCKET_BACKUPS: progctf-backups
      OBJECT_STORE_ACCESS_KEY: ${MINIO_ROOT_USER:?required}
      OBJECT_STORE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?required}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks: [progctf-fleet-net]
    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop: [ALL]

  # -----------------------------------------------------------------------
  # Frontend — Helmsman's Vite + React SPA, served by nginx-alpine.
  # -----------------------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_URL: /socket.io
    image: progctf/frontend:dev
    container_name: progctf-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks: [progctf-fleet-net]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]

  # -----------------------------------------------------------------------
  # Edge — nginx reverse proxy + rate limit + CSP. The only service that
  # publishes a host port in the committed config.
  # -----------------------------------------------------------------------
  edge:
    image: nginx:1.27.3-alpine@sha256:fb39280b7b9eba5727c884a3c7810002e69e8f961cc373b89c92f1f1d1f63f6a
    container_name: progctf-edge
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [progctf-fleet-net]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]

  # -----------------------------------------------------------------------
  # Sandbox controller stub — the real implementation is a Phase-2 thing
  # (Powder Monkey hands off island.yaml files and Shipwright wires up the
  # K8s reconciliation loop). For local dev we ship a tiny stub so Bosun's
  # /admin/sandbox/:id/rebuild has something to call. See
  # infra/k8s/sandbox-controller/ for the production contract.
  # -----------------------------------------------------------------------
  sandbox-controller:
    image: nginx:1.27.3-alpine@sha256:fb39280b7b9eba5727c884a3c7810002e69e8f961cc373b89c92f1f1d1f63f6a
    container_name: progctf-sandbox-controller
    restart: unless-stopped
    command: >
      /bin/sh -c "
      echo 'server { listen 8080; location / { return 501 \"sandbox-controller stub — see infra/k8s/sandbox-controller/README.md\"; add_header Content-Type text/plain; } location = /healthz { return 200 \"ok\"; access_log off; } }' > /etc/nginx/conf.d/default.conf &&
      nginx -g 'daemon off;'
      "
    networks: [progctf-fleet-net]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
