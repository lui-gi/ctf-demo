name: progctf-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: progctf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: progctf
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: progctf
    ports:
      - "5433:5432"
    volumes:
      - progctf-postgres-data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: progctf-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  progctf-postgres-data:
