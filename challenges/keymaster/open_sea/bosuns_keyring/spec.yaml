slug: bosuns_keyring
title: "The Bosun's Keyring"
category: keymaster
difficulty: open_sea
tier_points: open_sea
hosting:
  needed: false
  type: none
  isolation: shared
  hint_for_powder_monkey: ""
artifacts:
  needed: true
  hint_for_powder_monkey: "Two files. (1) shipnames.txt: 800 lines, one fictional 18th-century ship name per line (use a generated list — vary length and style; sample: 'Reefborn', 'SaltedPheasant', 'Albatross', 'CrescentMaid', etc.). MUST include the literal string 'Reefborn' on a line that is NEITHER the first nor the last 50 lines. No duplicates. (2) treasure.7z: a 7-zip archive containing exactly one file 'treasure.txt' whose content is exactly 'progctf{the_bosun_loved_a_pattern}\\n'. Create with: `echo 'progctf{the_bosun_loved_a_pattern}' > treasure.txt; 7z a -p'Reefborn1803!' -mhe=on treasure.7z treasure.txt`. The -mhe=on flag header-encrypts the archive (so even file listings are encrypted). Verify: 7z2hashcat treasure.7z produces a $7z$... hash that hashcat -m 11600 cracks against the candidate wordlist (800 names × years 1790-1810 × ['!','?','.'])."
unintended_solve_traps:
  - "Do not put the password anywhere outside the cracking workflow."
  - "shipnames.txt must contain Reefborn (the correct name) but not in position 1 or last 50 — players must brute through, not eyeball."
  - "Use header encryption (-mhe=on) so the archive contents are not enumerable without the password."
  - "Verify cracking works end-to-end with a sample run before shipping."
  - "Do not mark the archive year/punctuation in any obvious way (no comment field, no filename hint)."
