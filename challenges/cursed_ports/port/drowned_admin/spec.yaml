slug: drowned_admin
title: "The Drowned Admin"
category: cursed_ports
difficulty: port
tier_points: port
hosting:
  needed: true
  type: web
  isolation: per_crew
  hint_for_powder_monkey: "Tiny Express or Flask app with a SQLite-backed login form. Username is concatenated directly into the SQL string ('SELECT * FROM admins WHERE username=\\'<u>\\' AND password=\\'<p>\\''). On any SQL error, render the raw exception text on the page (so a single quote leaks the engine name). On successful auth, render a dashboard with a banner reading 'Welcome back, <username>. Your treasure is safe: <FLAG>'. Seed at least one admin row; ensure 'Eli' is the first row returned for tautology-style payloads."
artifacts:
  needed: false
  hint_for_powder_monkey: ""
unintended_solve_traps:
  - "Do not put the flag in any HTML comment, response header, or static JS bundle."
  - "Do not allow login with empty password unless SQLi is used (no '' = '' shortcut)."
  - "Block directory listing; do not expose .git or backup files."
  - "Disable verbose stack traces on routes other than /login (we want SQLi-revealing errors only on the targeted form)."
