slug: smugglers_manifest
title: "The Smuggler's Manifest"
category: cursed_ports
difficulty: open_sea
tier_points: open_sea
hosting:
  needed: true
  type: web
  isolation: per_crew
  hint_for_powder_monkey: "Express + mongoose. POST /api/cargo/search accepts a JSON body and runs Cargo.find({ hidden: false, ...req.body }) — naive object merge that lets the user inject Mongo operators (and override the default 'hidden' filter). Seed ~30 visible cargo docs (name, weight, port, hidden:false) and EXACTLY ONE hidden doc {name:'<random_decoy_name>', weight:..., port:..., hidden:true, treasure:'progctf{calderwoods_dollar_sign_problem}'}. The vulnerability: the merge order ({hidden:false} BEFORE the body spread) means a player-supplied 'hidden' field — literal `true` or operator `{$ne: false}` — silently overrides the default. The 'treasure' field then leaks via the response projector. Disable verbose Mongo errors; do not echo the query."
  # PM deviation accepted on 2026-05-01 (Quartermaster sign-off):
  # The original hint specified `Cargo.find({ ...req.body, hidden: false })`
  # plus a `$where` exploit chain. Powder Monkey correctly identified that
  # MongoDB AND-semantics make `hidden:false` an inviolable filter at the
  # query level; `$where` is evaluated alongside, not in place of, the other
  # filter clauses. The shipped pattern flips the merge order so the body
  # genuinely overrides the default — same OWASP NoSQL-injection lesson,
  # exploit chain that actually works. solution.md "Implementer note for
  # the solve walk above" documents the deviation. First Mate: this is a
  # locked design choice, not a build bug — please do NOT re-file.
artifacts:
  needed: false
  hint_for_powder_monkey: ""
unintended_solve_traps:
  - "Do not allow GET-with-querystring operator injection unless you intend it; specify POST-JSON-only."
  - "Do not expose /api/cargo/all or any debug endpoint that lists hidden docs."
  - "The flag must live in the `treasure` field of the hidden doc only — not in any visible doc, not in any error response, not in source comments."
  - "Disable Mongo $where if your seed environment requires it for safety, BUT keep it enabled for this specific challenge container — that's the intended attack."
  - "Do not log queries to a publicly-readable file."
