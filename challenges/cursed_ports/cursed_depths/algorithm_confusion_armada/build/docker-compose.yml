services:
  # ----- shared keypair sidecar (writes to a named volume) -----
  keygen:
    image: alpine:3.20
    command:
      - sh
      - -c
      - |
        apk add --no-cache openssl
        if [ ! -f /keys/private.pem ]; then
          openssl genrsa -out /keys/private.pem 2048
          openssl rsa -in /keys/private.pem -pubout -out /keys/public.pem
        fi
        chmod 644 /keys/public.pem
        chmod 600 /keys/private.pem
    volumes:
      - keys:/keys
    restart: "no"
    networks: [internal]

  # ----- auth-service (RS256 issuer, RS256+HS256 verifier) -----
  auth:
    build:
      context: ../src/auth-service
    depends_on:
      keygen:
        condition: service_completed_successfully
    environment:
      PORT: "8080"
      PRIV_KEY_PATH: /app/keys/private.pem
      PUB_KEY_PATH: /app/keys/public.pem
    volumes:
      - keys:/app/keys:ro
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks: [internal]

  # ----- dispatch-service (SSRF + JWT scope=service) -----
  dispatch:
    build:
      context: ../src/dispatch-service
    depends_on:
      keygen:
        condition: service_completed_successfully
    environment:
      PORT: "8080"
      PUB_KEY_PATH: /app/keys/public.pem
    volumes:
      - keys:/app/keys:ro
    ports:
      - "8082:8080"
    restart: unless-stopped
    networks: [internal]

  # ----- metadata-mock (assumes 169.254.169.254 alias) -----
  metadata-mock:
    build:
      context: ../src/metadata-mock
    environment:
      ARMADA_AKID: "${ARMADA_AKID:-AKIADISPATCHERVERY01}"
      ARMADA_SECRET: "${ARMADA_SECRET:-DISPATCHERSECRET00ABCDEFGHIJKLMNOPQRSTUVW}"
      ARMADA_TOKEN: "${ARMADA_TOKEN:-FwoGZXIvYXdzELMARMADASESSION}"
    networks:
      internal:
        ipv4_address: 169.254.169.254
    restart: unless-stopped

  # ----- s3-mock (minio with SigV4) -----
  s3-mock:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: ["server", "/data", "--address", ":9000"]
    environment:
      MINIO_ROOT_USER: "${ARMADA_AKID:-AKIADISPATCHERVERY01}"
      MINIO_ROOT_PASSWORD: "${ARMADA_SECRET:-DISPATCHERSECRET00ABCDEFGHIJKLMNOPQRSTUVW}"
    networks:
      internal:
        aliases:
          - s3-mock.local
    restart: unless-stopped

  # ----- s3-mock seeder (one-shot) -----
  s3-mock-init:
    build:
      context: ../src/s3-mock-init
    depends_on:
      - s3-mock
    environment:
      S3_ENDPOINT: "http://s3-mock:9000"
      MINIO_ROOT_USER: "${ARMADA_AKID:-AKIADISPATCHERVERY01}"
      MINIO_ROOT_PASSWORD: "${ARMADA_SECRET:-DISPATCHERSECRET00ABCDEFGHIJKLMNOPQRSTUVW}"
      ARMADA_FLAG: "progctf{the_armada_confused_its_algorithms}"
    restart: "no"
    networks: [internal]

volumes:
  keys: {}

networks:
  internal:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 169.254.0.0/16
