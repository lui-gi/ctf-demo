slug: algorithm_confusion_armada
title: "Armada of Confusion"
category: cursed_ports
difficulty: cursed_depths
tier_points: cursed_depths
hosting:
  needed: true
  type: web
  isolation: per_crew
  hint_for_powder_monkey: "Multi-service docker-compose. (1) auth-service (Node.js or Python): generates RS256 JWTs on /api/auth/login, exposes public key at /jwks.json (also derivable as PEM), VULNERABLE verifier accepts algorithms=['RS256','HS256'] on the same key bytes (treats the public PEM as both an RSA key for RS256 and a raw HMAC secret for HS256). (2) dispatch-service: requires JWT with claim scope='service'. GET /fleet/dispatch?target=<url> performs server-side HTTP fetch with deny-list (rejects localhost/127.0.0.1/0.0.0.0/<container_self>) but DOES NOT block 169.254.0.0/16 or *.local. Returns response body verbatim (so SSRF response is readable). (3) metadata-mock: listens on 169.254.169.254:80 inside the docker network, serves /latest/meta-data/iam/security-credentials/dispatcher with JSON {AccessKeyId, SecretAccessKey, Token, Expiration} — random per container. (4) s3-mock: minio or custom Flask SigV4-validating server at s3-mock.local. Bucket 'sealed', object 'manifest.txt' with content 'progctf{the_armada_confused_its_algorithms}\\n'. Credentials given by metadata-mock must be valid for SigV4 against s3-mock. Per-crew isolation: each crew gets its own compose stack. Auto-restart on idle 45 minutes."
artifacts:
  needed: false
  hint_for_powder_monkey: ""
unintended_solve_traps:
  - "Do NOT expose s3-mock or metadata-mock to direct player access — only via dispatch SSRF."
  - "Auth service must NOT log forged tokens to a player-readable endpoint."
  - "S3 mock must enforce SigV4 — do not let unsigned GETs work."
  - "Metadata mock credentials must be unique per container so teams cannot share solutions trivially."
  - "Treasure file is ONLY in the S3 bucket — not on the host filesystem of any service."
  - "Disable JWKS rotation hooks; the public key must be stable for the duration of the challenge."
  - "Deny-list must include the obvious bypasses (decimal IPs, IPv6 mapped, etc.) for everything EXCEPT the link-local — that's the intended channel."
