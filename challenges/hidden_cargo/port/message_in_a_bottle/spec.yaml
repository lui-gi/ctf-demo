slug: message_in_a_bottle
title: "Message in a Bottle"
category: hidden_cargo
difficulty: port
tier_points: port
hosting:
  needed: false
  type: none
  isolation: shared
  hint_for_powder_monkey: ""
artifacts:
  needed: true
  hint_for_powder_monkey: "Generate 'bottle.png'. Use a small (~200 KB max) image of a corked bottle on a beach (AI-generated or public domain). After encoding the PNG normally, append the literal byte sequence '\\nX marks the spot — progctf{x_marks_the_glass_bottle}\\n' AFTER the final IEND chunk (after the four CRC bytes following IEND). Verify with `xxd | tail` that the bytes appear after IEND, and verify the image still renders in Firefox/Chrome/macOS Preview. The file MUST still be a valid PNG that opens normally."
unintended_solve_traps:
  - "Do not put the flag in EXIF (this overlaps with the Lighthouse Port challenge — keep techniques distinct)."
  - "Do not LSB-encode the flag — Port tier is append-after-EOF only."
  - "Do not split the flag across multiple chunks; one contiguous ASCII string."
  - "Do not name the file 'flag.png'."
