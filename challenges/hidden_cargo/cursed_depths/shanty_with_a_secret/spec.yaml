artifacts:
  needed: true
  hint_for_powder_monkey: "Two artifacts. (1) lyrics.pdf: A two-column broadside-style PDF with ~30 four-line verses of fabricated pirate-themed lyrics in English. The lyrics text MUST satisfy: when tokenized into words, articles ['a','an','the','and','or','of','to','in','on','it','is'] are removed, and every 7th word from the remaining word list is taken (1st, 8th, 15th, ...), the FIRST LETTER of each selected word spells exactly the passphrase 'pale_cassandra_drift_19' (where underscores represent intentional word boundaries — i.e. spell 'palecassandradrift19' with the digits coming from words starting with 'one', 'nine'). Use reportlab or LaTeX. Verify with a tokenization+selection script before shipping. (2) shanty.mp3: ~3-minute MP3 audio of the lyrics being sung (synth voice OR recorded). Embed the literal payload 'progctf{the_shanty_kept_two_halves}\\n' using MP3Stego (Petitcolas) with passphrase 'pale_cassandra_drift_19'. Build mp3stego from source if needed (https://www.petitcolas.net/steganography/mp3stego/). Verify decode: `mp3stego decode -X -P 'pale_cassandra_drift_19' shanty.mp3 out.bin && cat out.bin` outputs the literal flag."
unintended_solve_traps:
  - "Do NOT include the passphrase or flag as plaintext anywhere visible (no PDF metadata, no MP3 ID3 tags)."
  - "Verify the acrostic with a script: tokenize lyrics.pdf via pdftotext, apply the documented rule, confirm output is exactly 'pale_cassandra_drift_19' (or the agreed passphrase)."
  - "Verify mp3stego decode produces the exact flag bytes."
  - "Article stop-list must be DOCUMENTED in spec — pick a definitive list and use it consistently."
  - "Lyrics body must be plausibly readable as a real shanty (no obvious nonsense from forced word choices)."
  - "Do not use a passphrase that contains characters not legal in mp3stego's IDEA key derivation; alphanumeric + underscore is safe."
