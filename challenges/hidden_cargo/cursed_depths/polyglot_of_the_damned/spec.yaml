  hint_for_powder_monkey: "Single artifact: polyglot.bin — a single file that is simultaneously a valid PNG, ZIP, and PDF. The full Treasure is 'progctf{the_three_faces_of_a_single_b1n_polyglot}' (49 chars). Split into four fragments: F1='progctf{the_thr' (15 chars), F2='ee_faces_of_a_si' (16 chars), F3='ngle_b1n' (8 chars), F4='_polyglot}' (10 chars). Construction (use mitra polyglot tool or hand-craft): (a) PNG container at file start: 200x200 RGBA PNG of any in-theme image. Encode F1 (15 bytes = 120 bits) into the LSB of the alpha channel of the first 120 pixels in row-major order. PNG must include an iTXt chunk with key 'xorpad' and value = base64(constant_32_bytes), where constant_32_bytes is computed as SHA-256(F1||F2||F3) XOR (F4 padded to 32 bytes with 0x00). (b) PDF body inserted between PNG's IEND and the ZIP structure: a minimal 1-page PDF with multiple stream objects. ONE object's stream contains exactly the literal F3 (compressed with FlateDecode). That object's number must NOT appear in any /Page or /Kids entry — it's truly orphan. PDF parsers find /Root by scanning backwards from %%EOF, so it must be valid even with PNG bytes preceding. (c) ZIP central directory + EOCD at file end: ZIP must contain at least one entry. One entry has filename='note', file_size=0 (no data), and per-entry comment field = exactly F2 (16 bytes). VERIFY: file polyglot.bin → PNG; unzip -l polyglot.bin → lists entries; mutool/qpdf opens as PDF; PIL opens as RGBA PNG; binwalk shows all three signatures."
unintended_solve_traps:
  - "Do NOT include any fragment of the flag as plaintext anywhere outside its intended hiding spot."
  - "Do NOT include the assembled full flag string anywhere in the file."
  - "Verify SHA-256(F1||F2||F3) XOR xorpad == F4 padded; if construction is off, the fourth fragment will not match."
  - "PNG must be valid (PIL opens), PDF must render (mutool draws page 1), ZIP must list entries (unzip -l)."
  - "iTXt chunk must use key 'xorpad' (the README/whispers reference this name)."
  - "Pixel LSB modifications must NOT visibly alter the image."
  - "Use Mitra (https://github.com/corkami/mitra) or similar to generate the polyglot scaffold; embed fragments after."
