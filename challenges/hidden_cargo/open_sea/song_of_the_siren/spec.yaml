artifacts:
  needed: true
  hint_for_powder_monkey: "Two artifacts. (1) siren.wav: 10-second 44.1 kHz mono WAV file. Background: a simple 4-bar sea-shanty melody (synth-generated tones in the 200-1000 Hz range, simple square or sine waves OK). Overlay: in the 8-14 kHz frequency band, paint the literal text 'X:412 Y:308' as visible characters in the spectrogram. Use a tool like Sonic Visualiser's painting feature, sstv, or direct numpy synthesis (each character as a vertical block of frequencies for ~0.5 seconds). The text must be clearly readable in any standard spectrogram view (Audacity Analyze→Spectrogram or Sonic Visualiser). (2) chart.png: 1024x768 RGB PNG of an AI-generated antique nautical chart. In the 50x50 pixel region centered at (x=412, y=308), encode the literal flag string 'progctf{the_siren_sang_in_pixels}' in the LSB of the BLUE channel, row-major, bits packed MSB-first into bytes, padded with zeros to fill the 2500-pixel region. Outside this region, blue channel LSBs should be unmodified (random per the source image). Verify decoder: a 30-line Python script reading the region, extracting blue LSBs, and unpacking bytes recovers the flag exactly."
unintended_solve_traps:
  - "Do not LSB-encode the flag elsewhere in the image — only in the 50x50 region (so the spectrogram pointer is meaningful)."
  - "Do not put coordinates anywhere else (no EXIF, no filename) — only in the spectrogram."
  - "Do not put the flag in audio file metadata."
  - "Verify the spectrogram text is readable in Audacity's default settings (window 2048, hann)."
  - "Use a 24-bit-depth PNG (no alpha channel) — keep it simple. If alpha needed, encode in blue only."
