# tideline — static site nginx config.
# Hard rules: no directory listing, no dotfile/source exposure, no robots.txt
# advertising hidden paths, no server-token leak.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;
    charset utf-8;

    # Default: serve a file or fall through to its index.html (so /u/<handle>
    # rewrites to /u/<handle>/index.html and the URL stays clean).
    location / {
        try_files $uri $uri/ $uri/index.html =404;
        autoindex off;
    }

    # Block ALL dotfiles and source-control / editor scratch.
    location ~ /\.(?!well-known) {
        return 404;
    }
    location ~* \.(md|yaml|yml|sh|py|json)$ {
        return 404;
    }
    location = /robots.txt {
        # explicit blank — do not advertise hidden paths
        return 200 "# nothing to crawl here, sailor\n";
        add_header Content-Type text/plain;
    }
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }
}
