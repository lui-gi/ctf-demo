server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    types {
        text/html       html htm;
        text/css        css;
        text/csv        csv;
        image/svg+xml   svg;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.csv$ {
        default_type "text/csv; charset=utf-8";
        try_files $uri =404;
    }

    error_page 404 /404.html;
    location = /404.html { internal; }
}
