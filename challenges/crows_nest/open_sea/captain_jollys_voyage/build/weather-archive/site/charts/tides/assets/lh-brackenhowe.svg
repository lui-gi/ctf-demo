<?xml version="1.0" encoding="UTF-8"?>
<!--
  lh-brackenhowe.svg -- decoy lighthouse thumbnail for Brackenhowe Quay.
  Same red-and-white striped colour scheme but CYLINDRICAL tower (not
  square base) -- a player who relies only on visual ID may flag this
  as a candidate. The tide-reading cross-reference is what disambiguates.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160" role="img" aria-label="Red-and-white striped cylindrical lighthouse">
  <rect width="120" height="160" fill="#cfdde2"/>
  <rect y="120" width="120" height="40" fill="#7a9bae"/>
  <path d="M0,128 L40,118 L90,118 L120,128 L120,160 L0,160 Z" fill="#3a3f44"/>
  <!-- cylindrical base (round footprint suggested by the elliptical top) -->
  <ellipse cx="60" cy="118" rx="14" ry="3" fill="#2a2520"/>
  <rect x="46" y="90" width="28" height="28" fill="#5c5042" stroke="#2a2520" stroke-width="0.7"/>
  <ellipse cx="60" cy="90" rx="14" ry="3" fill="#3a3f44"/>
  <!-- cylindrical tower with subtle ellipse caps to suggest roundness -->
  <rect x="52" y="78" width="16" height="12" fill="#f0e4cf"/>
  <ellipse cx="60" cy="78" rx="8" ry="2" fill="#e3d6bf"/>
  <rect x="53" y="66" width="14" height="12" fill="#a8392b"/>
  <ellipse cx="60" cy="66" rx="7" ry="1.6" fill="#8d2e25"/>
  <rect x="54" y="54" width="12" height="12" fill="#f0e4cf"/>
  <ellipse cx="60" cy="54" rx="6" ry="1.4" fill="#e3d6bf"/>
  <rect x="55" y="42" width="10" height="12" fill="#a8392b"/>
  <ellipse cx="60" cy="42" rx="5" ry="1.2" fill="#8d2e25"/>
  <rect x="56" y="30" width="8" height="12" fill="#f0e4cf"/>
  <rect x="54" y="28" width="12" height="3" fill="#2a2520"/>
  <rect x="57" y="20" width="6" height="8" fill="#2a2520"/>
  <rect x="58" y="22" width="4" height="4" fill="#fce6a4"/>
  <path d="M56,20 Q60,13 64,20 Z" fill="#2a2520"/>
  <rect x="59.4" y="9" width="1.2" height="4" fill="#2a2520"/>
</svg>
