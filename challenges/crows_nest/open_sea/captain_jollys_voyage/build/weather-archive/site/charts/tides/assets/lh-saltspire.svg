<?xml version="1.0" encoding="UTF-8"?>
<!--
  lh-saltspire.svg -- decoy lighthouse thumbnail for Saltspire Landing.
  Same red-and-white striped colour scheme but HEXAGONAL stone base -- the
  base footprint differs from Silvercove's square base. Visual decoy #2.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160" role="img" aria-label="Red-and-white striped hexagonal-base lighthouse">
  <rect width="120" height="160" fill="#cfdde2"/>
  <rect y="120" width="120" height="40" fill="#7a9bae"/>
  <path d="M0,128 L40,118 L90,118 L120,128 L120,160 L0,160 Z" fill="#3a3f44"/>
  <!-- hexagonal base: front face plus visible side facet -->
  <polygon points="44,94 56,90 76,90 86,96 86,118 44,118" fill="#5c5042" stroke="#2a2520" stroke-width="0.7"/>
  <line x1="56" y1="90" x2="56" y2="118" stroke="#2a2520" stroke-width="0.6"/>
  <line x1="76" y1="90" x2="76" y2="118" stroke="#2a2520" stroke-width="0.6"/>
  <rect x="44" y="88" width="42" height="3" fill="#2a2520"/>
  <!-- tower bands -->
  <rect x="52" y="76" width="16" height="12" fill="#f0e4cf"/>
  <rect x="53" y="64" width="14" height="12" fill="#a8392b"/>
  <rect x="54" y="52" width="12" height="12" fill="#f0e4cf"/>
  <rect x="55" y="40" width="10" height="12" fill="#a8392b"/>
  <rect x="56" y="28" width="8" height="12" fill="#f0e4cf"/>
  <rect x="54" y="26" width="12" height="3" fill="#2a2520"/>
  <rect x="57" y="18" width="6" height="8" fill="#2a2520"/>
  <rect x="58" y="20" width="4" height="4" fill="#fce6a4"/>
  <path d="M56,18 Q60,11 64,18 Z" fill="#2a2520"/>
  <rect x="59.4" y="7" width="1.2" height="4" fill="#2a2520"/>
</svg>
