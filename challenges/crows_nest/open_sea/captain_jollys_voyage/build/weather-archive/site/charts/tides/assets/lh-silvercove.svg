<?xml version="1.0" encoding="UTF-8"?>
<!--
  lh-silvercove.svg -- thumbnail of the Silvercove Anchorage lighthouse.
  Red-and-white striped, square stone base, domed cap. Matches the
  silhouette in the blog post photograph (sunset-quay.svg) -- this is
  the visual ID confirmation the player makes after they cross-reference
  the tide reading.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160" role="img" aria-label="Red-and-white striped square-base lighthouse">
  <rect width="120" height="160" fill="#cfdde2"/>
  <!-- horizon -->
  <rect y="120" width="120" height="40" fill="#7a9bae"/>
  <!-- promontory -->
  <path d="M0,128 L40,118 L90,118 L120,128 L120,160 L0,160 Z" fill="#3a3f44"/>
  <!-- square stone base (the diagnostic feature) -->
  <rect x="48" y="92" width="24" height="26" fill="#5c5042" stroke="#2a2520" stroke-width="0.7"/>
  <rect x="46" y="90" width="28" height="3" fill="#2a2520"/>
  <!-- tapering tower with five horizontal bands: white, red, white, red, white -->
  <rect x="52" y="80" width="16" height="12" fill="#f0e4cf"/>
  <rect x="53" y="68" width="14" height="12" fill="#a8392b"/>
  <rect x="54" y="56" width="12" height="12" fill="#f0e4cf"/>
  <rect x="55" y="44" width="10" height="12" fill="#a8392b"/>
  <rect x="56" y="32" width="8" height="12" fill="#f0e4cf"/>
  <!-- gallery deck -->
  <rect x="54" y="30" width="12" height="3" fill="#2a2520"/>
  <!-- lantern -->
  <rect x="57" y="22" width="6" height="8" fill="#2a2520"/>
  <rect x="58" y="24" width="4" height="4" fill="#fce6a4"/>
  <!-- domed cap -->
  <path d="M56,22 Q60,15 64,22 Z" fill="#2a2520"/>
  <!-- rod -->
  <rect x="59.4" y="11" width="1.2" height="4" fill="#2a2520"/>
</svg>
