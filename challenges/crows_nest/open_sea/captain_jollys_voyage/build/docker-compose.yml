# docker-compose for the Captain Jolly's Last Voyage CTF island.
#
# Boots three static-site nginx containers on localhost:8090..8092. In
# production Shipwright fronts them with a single hostname under
# `*.crescent.example`, mounting:
#
#   travel-blog     -> /blog/jolly-wexler/
#   tide-journal    -> /blog/jolly-wexler/tide.rss
#   weather-archive -> /charts/tides/
#
# For local dev / Powder Monkey verification each service binds to its own
# port; the cross-links inside the rendered pages use port-qualified URLs
# pointing at the localhost:8091 / 8092 ports so the pivot chain works.
#
# Flag handling:
#   - travel-blog  : never sees CHALLENGE_FLAG (must not contain the slug)
#   - tide-journal : never sees CHALLENGE_FLAG (must not contain the slug)
#   - weather-archive : receives CHALLENGE_FLAG only as a sanity check the
#                       harbour CSV exists. The slug appears literally in
#                       the static catalogue/CSV (intended hiding place).

name: captain-jollys-voyage

services:
  travel-blog:
    build: ./travel-blog
    image: captain-jollys-voyage/travel-blog:latest
    container_name: cjv-travel-blog
    ports:
      - "8090:80"
    networks: [cjv]
    restart: unless-stopped

  tide-journal:
    build: ./tide-journal
    image: captain-jollys-voyage/tide-journal:latest
    container_name: cjv-tide-journal
    ports:
      - "8091:80"
    networks: [cjv]
    restart: unless-stopped

  weather-archive:
    build: ./weather-archive
    image: captain-jollys-voyage/weather-archive:latest
    container_name: cjv-weather-archive
    ports:
      - "8092:80"
    environment:
      # Optional sanity check. The flag literal is NOT injected into any
      # served file; the harbour slug is baked into the static catalogue.
      # If unset, the entrypoint proceeds without checking.
      CHALLENGE_FLAG: "${CHALLENGE_FLAG:-}"
    networks: [cjv]
    restart: unless-stopped

networks:
  cjv:
    driver: bridge
