<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" role="img" aria-label="Empty cold quay at dawn">
  <defs>
    <linearGradient id="dawn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b4658"/>
      <stop offset="0.7" stop-color="#a4a89a"/>
      <stop offset="1" stop-color="#e0d2b3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#dawn)"/>
  <rect y="200" width="800" height="160" fill="#2a3338"/>
  <!-- quay -->
  <rect x="0" y="218" width="800" height="14" fill="#0e0f17"/>
  <rect x="0" y="232" width="800" height="128" fill="#181a25"/>
  <!-- bollards -->
  <g fill="#0e0f17">
    <rect x="80" y="206" width="10" height="14"/>
    <rect x="220" y="206" width="10" height="14"/>
    <rect x="360" y="206" width="10" height="14"/>
    <rect x="500" y="206" width="10" height="14"/>
    <rect x="640" y="206" width="10" height="14"/>
  </g>
</svg>
