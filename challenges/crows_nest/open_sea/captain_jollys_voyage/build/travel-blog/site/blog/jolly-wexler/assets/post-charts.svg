<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" role="img" aria-label="Hand-drawn chart on a chart table">
  <rect width="800" height="360" fill="#e7dcb8"/>
  <!-- chart paper texture lines -->
  <g stroke="#a08960" stroke-width="0.5" opacity="0.45">
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/>
    <line x1="600" y1="0" x2="600" y2="360"/>
    <line x1="700" y1="0" x2="700" y2="360"/>
  </g>
  <!-- coastline -->
  <path d="M50,250 Q150,200 250,230 Q350,260 450,210 Q550,180 700,230 L760,260 L760,340 L50,340 Z" fill="#7a9bae" opacity="0.7"/>
  <!-- compass rose -->
  <g transform="translate(620,90)">
    <circle r="40" fill="none" stroke="#1c1d24" stroke-width="1"/>
    <path d="M0,-40 L6,0 L0,40 L-6,0 Z" fill="#1c1d24"/>
    <path d="M-40,0 L0,6 L40,0 L0,-6 Z" fill="#1c1d24" opacity="0.5"/>
    <text x="0" y="-46" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#1c1d24">N</text>
  </g>
  <!-- soundings -->
  <g font-family="Georgia,serif" font-size="9" fill="#1c1d24" opacity="0.7">
    <text x="120" y="120">12</text>
    <text x="200" y="160">9</text>
    <text x="270" y="200">7</text>
    <text x="340" y="180">11</text>
    <text x="430" y="160">14</text>
    <text x="500" y="200">8</text>
  </g>
</svg>
