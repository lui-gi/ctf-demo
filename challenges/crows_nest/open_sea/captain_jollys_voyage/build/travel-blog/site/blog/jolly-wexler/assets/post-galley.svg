<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" role="img" aria-label="A galley pot steaming on a swinging stove">
  <rect width="800" height="360" fill="#1a1c2c"/>
  <!-- planking -->
  <g stroke="#0e0f17" stroke-width="1" opacity="0.6">
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="260" x2="800" y2="260"/>
  </g>
  <!-- swinging stove gimbal -->
  <g transform="translate(400,180)">
    <line x1="-80" y1="-100" x2="0" y2="-30" stroke="#5a4a30" stroke-width="2"/>
    <line x1="80" y1="-100" x2="0" y2="-30" stroke="#5a4a30" stroke-width="2"/>
    <rect x="-50" y="-30" width="100" height="40" fill="#3a2e22"/>
    <ellipse cx="0" cy="-30" rx="34" ry="10" fill="#1c1d24"/>
    <ellipse cx="0" cy="-46" rx="20" ry="8" fill="#9ca7ac" opacity="0.6"/>
    <ellipse cx="-2" cy="-58" rx="14" ry="6" fill="#cfdde2" opacity="0.4"/>
  </g>
  <!-- glow -->
  <ellipse cx="400" cy="160" rx="160" ry="80" fill="#a8392b" opacity="0.18"/>
</svg>
