<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" role="img" aria-label="Sloop drifting in a fog bank">
  <defs>
    <linearGradient id="fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bcc5ca"/>
      <stop offset="1" stop-color="#dfe5e8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="360" fill="url(#fog)"/>
  <!-- rigging suggested -->
  <g stroke="#3a3f44" stroke-width="1" opacity="0.6">
    <line x1="400" y1="60" x2="400" y2="240"/>
    <line x1="400" y1="80" x2="340" y2="240"/>
    <line x1="400" y1="80" x2="460" y2="240"/>
  </g>
  <!-- hull -->
  <path d="M320,240 L480,240 L460,260 L340,260 Z" fill="#3a3f44" opacity="0.85"/>
  <!-- waterline -->
  <rect x="0" y="262" width="800" height="98" fill="#9ca7ac" opacity="0.5"/>
</svg>
