<?xml version="1.0" encoding="UTF-8"?>
<!--
  sunset-quay.svg -- the photograph from "Sunset on a forgotten quay".
  Hand-authored SVG (no embedded raster, no metadata, no EXIF concept).
  Shows a red-and-white striped square-base lighthouse silhouette against
  a sunset sky with calm water. The visual landmark used for OSINT
  identification.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Sunset over a quay with a striped lighthouse">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b1a3a"/>
      <stop offset="0.35" stop-color="#9c3e3a"/>
      <stop offset="0.65" stop-color="#e2825c"/>
      <stop offset="0.92" stop-color="#f3c272"/>
      <stop offset="1" stop-color="#fce6a4"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2638"/>
      <stop offset="0.55" stop-color="#623144"/>
      <stop offset="1" stop-color="#1a1c2c"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.7" cy="0.78" r="0.15">
      <stop offset="0" stop-color="#fff7c8" stop-opacity="1"/>
      <stop offset="0.6" stop-color="#f3c272" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#f3c272" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="800" height="340" fill="url(#sky)"/>
  <!-- sun glow -->
  <rect x="0" y="0" width="800" height="340" fill="url(#sun)"/>
  <!-- distant haze -->
  <rect x="0" y="300" width="800" height="60" fill="#c2754c" fill-opacity="0.35"/>

  <!-- water -->
  <rect x="0" y="340" width="800" height="160" fill="url(#water)"/>
  <!-- sun reflection ripples -->
  <g opacity="0.55">
    <rect x="540" y="345" width="60" height="2" fill="#fce6a4"/>
    <rect x="525" y="358" width="80" height="2" fill="#f3c272"/>
    <rect x="510" y="372" width="110" height="2" fill="#e2825c"/>
    <rect x="500" y="388" width="140" height="2" fill="#c2754c"/>
    <rect x="495" y="408" width="160" height="2" fill="#9c3e3a"/>
    <rect x="490" y="430" width="180" height="2" fill="#7a3138"/>
  </g>

  <!-- distant headland silhouette -->
  <path d="M0,335 L120,310 L180,330 L260,300 L330,328 L400,318 L800,335 L800,360 L0,360 Z"
        fill="#1d2030" opacity="0.85"/>

  <!-- quay (foreground left) -->
  <rect x="0" y="368" width="240" height="14" fill="#0e0f17"/>
  <rect x="0" y="382" width="240" height="118" fill="#181a25"/>
  <!-- quay bollards -->
  <g fill="#0e0f17">
    <rect x="40" y="356" width="10" height="14"/>
    <rect x="115" y="356" width="10" height="14"/>
    <rect x="195" y="356" width="10" height="14"/>
  </g>

  <!-- promontory base of the lighthouse -->
  <path d="M540,360 L600,330 L740,332 L800,360 L800,400 L540,400 Z" fill="#181a25"/>

  <!-- LIGHTHOUSE: square-base, red-and-white horizontal stripes.
       Square base, then tapering tower with horizontal bands of
       alternating red and white (the visual ID landmark). -->
  <g>
    <!-- square stone base -->
    <rect x="640" y="280" width="60" height="60" fill="#2a2b33" stroke="#0e0f17" stroke-width="1"/>
    <rect x="635" y="276" width="70" height="8" fill="#1c1d24"/>
    <!-- tower tapering: rectangles with stripes -->
    <g>
      <!-- band 1 (white) -->
      <rect x="650" y="252" width="40" height="28" fill="#f0e4cf"/>
      <!-- band 2 (red) -->
      <rect x="652" y="226" width="36" height="26" fill="#a8392b"/>
      <!-- band 3 (white) -->
      <rect x="654" y="202" width="32" height="24" fill="#f0e4cf"/>
      <!-- band 4 (red) -->
      <rect x="656" y="180" width="28" height="22" fill="#a8392b"/>
      <!-- band 5 (white) -->
      <rect x="658" y="160" width="24" height="20" fill="#f0e4cf"/>
    </g>
    <!-- gallery deck -->
    <rect x="654" y="155" width="32" height="6" fill="#2a2b33"/>
    <!-- lantern room -->
    <rect x="660" y="138" width="20" height="17" fill="#1c1d24"/>
    <rect x="662" y="142" width="16" height="9" fill="#fce6a4" opacity="0.85"/>
    <!-- domed cap -->
    <path d="M658,138 Q670,124 682,138 Z" fill="#2a2b33"/>
    <!-- lightning rod -->
    <rect x="669" y="118" width="2" height="8" fill="#0e0f17"/>
  </g>

  <!-- a small moored boat -->
  <g transform="translate(200,395)">
    <path d="M0,0 L60,0 L52,16 L8,16 Z" fill="#0e0f17"/>
    <rect x="28" y="-22" width="2" height="22" fill="#0e0f17"/>
    <path d="M30,-22 L52,-4 L30,-4 Z" fill="#2a2b33" opacity="0.7"/>
  </g>

  <!-- gulls -->
  <g fill="none" stroke="#1c1d24" stroke-width="1.4" opacity="0.7">
    <path d="M380,120 q6,-6 12,0 q6,-6 12,0"/>
    <path d="M430,90 q5,-5 10,0 q5,-5 10,0"/>
    <path d="M480,140 q4,-4 8,0 q4,-4 8,0"/>
  </g>
</svg>
