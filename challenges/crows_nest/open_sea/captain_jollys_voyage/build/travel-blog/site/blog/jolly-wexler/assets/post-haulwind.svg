<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" role="img" aria-label="A small sloop heeled over in a stiff breeze">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a9bae"/>
      <stop offset="1" stop-color="#cfdde2"/>
    </linearGradient>
    <linearGradient id="water2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c4a55"/>
      <stop offset="1" stop-color="#173039"/>
    </linearGradient>
  </defs>
  <rect width="800" height="220" fill="url(#sky2)"/>
  <rect y="220" width="800" height="140" fill="url(#water2)"/>
  <!-- whitecaps -->
  <g fill="#cfdde2" opacity="0.6">
    <path d="M40,250 q10,-6 20,0 t20,0 t20,0 t20,0 t20,0"/>
    <path d="M250,275 q10,-6 20,0 t20,0 t20,0"/>
    <path d="M520,260 q10,-6 20,0 t20,0 t20,0 t20,0"/>
    <path d="M680,290 q10,-6 20,0 t20,0"/>
  </g>
  <!-- sloop -->
  <g transform="translate(400,210) rotate(-8)">
    <path d="M-80,30 L80,30 L60,50 L-60,50 Z" fill="#221b14"/>
    <rect x="-2" y="-90" width="4" height="120" fill="#3a2e22"/>
    <path d="M2,-90 L60,30 L2,30 Z" fill="#f0e4cf"/>
    <path d="M-2,-90 L-2,20 L-50,20 Z" fill="#e9dabb"/>
  </g>
</svg>
