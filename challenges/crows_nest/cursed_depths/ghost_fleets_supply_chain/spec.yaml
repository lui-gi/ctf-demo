  hint_for_powder_monkey: "Multi-subdomain static infrastructure under *.marrowtide.example (or whatever the platform assigns). Five fake services: (1) marrowtide.example: corporate site with About page listing 3 fabricated employees: Sela Marrowfen (CTO), Kaspar Threnody (Head of Operations), Ines Tidemark (Senior Engineer). Ines's bio mentions 'maintainer of marrowtide-internal/manifests-cli — our private tooling for cargo manifest validation' and footer links to npm.marrowtide.example. (2) npm.marrowtide.example: static JSON or mini-mock of an npm registry. Package marrowtide-internal/manifests-cli with package.json including repository.url='git+https://git.marrowtide.example/manifests-cli'. (3) git.marrowtide.example: Gitea-like static page; 'manifests-cli' repo exists but is private (returns auth gate UI); the public landing page README mentions 'staging-internal.marrowtide.example' (a red herring) and links to crt.marrowtide.example. (4) crt.marrowtide.example: static crt.sh-style search returning JSON list of all subdomain certificates issued for *.marrowtide.example. The list MUST include vault.marrowtide.example (not linked from anywhere else) along with mundane subdomains (www, api, mail, npm, git, crt, staging-internal). (5) vault.marrowtide.example: root returns 404 page; /.well-known/security.txt returns Contact/Encryption/Acknowledgements headers with Acknowledgements pointing at /known-issues/cgo7w3.html; /known-issues/cgo7w3.html is a static HTML page with body content of fake 'thanks to' credits and 5 <figure> blocks each containing an <img alt='WORD'> where WORDS in document order are: the, ghost, fleet, sails, inland. Personas (3-6 breadcrumbs each): Sela Marrowfen — CTO, ex-shipbuilder, public talks at fictional cargo conf, MIT-ish profile photo (AI-generated). Kaspar Threnody — Head of Ops, dock-side experience, founded a fictional non-profit. Ines Tidemark — engineer, Python+TS, maintainer of manifests-cli, gives meetup talks. ALL FABRICATED — verify no real-world name collisions."
artifacts:
  needed: false
  hint_for_powder_monkey: ""
unintended_solve_traps:
  - "vault.marrowtide.example MUST NOT be linked from anywhere except the CT log."
  - "The flag sentence words MUST only appear in the alt attributes of the 5 figures, in order — not in any other page's text or filenames."
  - "Every persona is fictional; reverse-image-search any AI-generated portraits to ensure they don't match a real person."
  - "Do not put the flag string anywhere as a literal — it must be assembled from the alt attributes."
  - "All 5 services must be reachable from the player's network (no auth gates other than the git private-repo display, which is intentional)."
  - "CT log search results must be deterministic and complete — no paging gotchas that hide vault subdomain."
  - "The 'staging-internal' subdomain mentioned in git README is a red herring — must serve a 404 or empty page; do NOT contain flag clues."
