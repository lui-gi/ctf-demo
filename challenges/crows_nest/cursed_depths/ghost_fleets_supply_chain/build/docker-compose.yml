# docker-compose for the Ghost Fleet's Supply Chain CTF island.
#
# Boots all 8 fake services on localhost:8080..8087. The challenge flag is
# injected ONLY into the hidden-page service, via the CHALLENGE_FLAG
# environment variable. By default we read it from ../flag.txt at compose
# time using a small wrapper script — see build/README.md.
#
# All services are isolated on a private compose network. In production
# Shipwright will apply NetworkPolicy with zero public egress; the services
# themselves only need to be reachable by the player (north-south HTTP).

name: ghost-fleets-supply-chain

services:
  marrowtide-corp:
    build: ./marrowtide-corp
    image: ghost-fleets/marrowtide-corp:latest
    container_name: gfsc-marrowtide-corp
    ports:
      - "8080:80"
    networks: [gfsc]
    restart: unless-stopped

  npm-registry-mock:
    build: ./npm-registry-mock
    image: ghost-fleets/npm-registry-mock:latest
    container_name: gfsc-npm-registry-mock
    ports:
      - "8081:80"
    networks: [gfsc]
    restart: unless-stopped

  git-host-mock:
    build: ./git-host-mock
    image: ghost-fleets/git-host-mock:latest
    container_name: gfsc-git-host-mock
    ports:
      - "8082:80"
    networks: [gfsc]
    restart: unless-stopped

  ct-log-mock:
    build: ./ct-log-mock
    image: ghost-fleets/ct-log-mock:latest
    container_name: gfsc-ct-log-mock
    ports:
      - "8083:80"
    networks: [gfsc]
    restart: unless-stopped

  hidden-page:
    build: ./hidden-page
    image: ghost-fleets/hidden-page:latest
    container_name: gfsc-hidden-page
    ports:
      - "8084:80"
    environment:
      # The flag literal must be supplied via CHALLENGE_FLAG. In production
      # the orchestrator injects it from a K8s secret. For local dev/QA the
      # build/build.sh script reads ../flag.txt and exports CHALLENGE_FLAG
      # before running `docker compose up`.
      CHALLENGE_FLAG: "${CHALLENGE_FLAG:?CHALLENGE_FLAG is required (run via build/build.sh or export it manually)}"
    networks: [gfsc]
    restart: unless-stopped

  persona-1-sela:
    build: ./persona-1
    image: ghost-fleets/persona-1-sela:latest
    container_name: gfsc-persona-1-sela
    ports:
      - "8085:80"
    networks: [gfsc]
    restart: unless-stopped

  persona-2-kaspar:
    build: ./persona-2
    image: ghost-fleets/persona-2-kaspar:latest
    container_name: gfsc-persona-2-kaspar
    ports:
      - "8086:80"
    networks: [gfsc]
    restart: unless-stopped

  persona-3-ines:
    build: ./persona-3
    image: ghost-fleets/persona-3-ines:latest
    container_name: gfsc-persona-3-ines
    ports:
      - "8087:80"
    networks: [gfsc]
    restart: unless-stopped

networks:
  gfsc:
    driver: bridge
