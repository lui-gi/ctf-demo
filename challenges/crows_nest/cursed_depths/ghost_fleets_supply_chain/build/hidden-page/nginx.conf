server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve security.txt and the obfuscated known-issues page directly.
    location = /.well-known/security.txt {
        default_type "text/plain";
    }

    location /known-issues/ {
        try_files $uri =404;
    }

    location /keys/ {
        try_files $uri =404;
    }

    # Everything else: custom 404 (root page should APPEAR empty/missing).
    location / {
        return 404;
    }

    error_page 404 /404.html;
    location = /404.html { internal; root /usr/share/nginx/html; }
}
