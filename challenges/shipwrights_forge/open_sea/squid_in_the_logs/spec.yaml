slug: squid_in_the_logs
title: "Squid in the Logs"
category: shipwrights_forge
difficulty: open_sea
tier_points: open_sea
hosting:
  needed: false
  type: none
  isolation: shared
  hint_for_powder_monkey: ""
artifacts:
  needed: true
  hint_for_powder_monkey: "Generate access.log: a Squid combined-format access log of ~40 MB / ~200,000 lines. Most lines: realistic noise traffic (varied UAs spanning Chrome/Firefox/Safari, varied source IPs from a /16, varied URLs to common public domains, HTTP 200/304/403). Exfil traffic: ~2,000 lines all with User-Agent literal 'DeadwakeOps/0.1 (channel)', requesting URLs of the form 'https://innocentlooking.example/api/track?seq=<N>&data=<b64chunk>' where N runs 0..1999 and b64chunk is a 24-char URL-safe base64 segment. The full payload, when reassembled in seq-order and base64-decoded, must form a small file (text OR a 1-page PDF works) whose visible content contains the line 'progctf{squid_ate_the_canary}'. CRITICAL: the exfil rows must be SHUFFLED into the log timeline so naive concat-in-log-order produces gibberish — players MUST sort by seq."
artifacts_extra_note: "If you choose PDF as the payload, ensure the text 'progctf{squid_ate_the_canary}' is selectable text (not rasterized)."
unintended_solve_traps:
  - "Do not include the flag string anywhere outside the reassembled exfil payload."
  - "Do not let the unique UA appear in any non-exfil log lines (background traffic UAs must be plausible browser strings only)."
  - "Verify by simulated solve: filter, sort, concat, decode, and check the result file contains the literal flag."
  - "Sequence numbers must be 0..1999 contiguous (no gaps) so reassembly is unambiguous."
