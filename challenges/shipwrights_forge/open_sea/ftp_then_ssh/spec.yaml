slug: ftp_then_ssh
title: "Two Pcaps, One Boarding"
category: shipwrights_forge
difficulty: open_sea
tier_points: open_sea
hosting:
  needed: false
  type: none
  isolation: shared
  hint_for_powder_monkey: ""
artifacts:
  needed: true
  hint_for_powder_monkey: "Two pcap files. (1) ftp.pcap: simulated FTP session (port 21 control + 20 data) where client logs in as captain_thorne / bilgewater_sunset_71 then RETRs a binary file 'shell_history.txt.enc'. The .enc file is the OpenSSL-encrypted output of: `openssl enc -aes-256-cbc -k 'wraith_above_the_waves' -in hist.txt -out shell_history.txt.enc`, where hist.txt contains realistic bash history including ONE line of the form `echo 'progctf{two_captures_one_captain}' >> /root/.note`. (2) usb.pcap: USB HID keyboard capture (compatible with Wireshark's usbhid dissector). Have the captured keystrokes spell out (with 1-2 typos + backspaces for realism): `openssl enc -d -aes-256-cbc -in shell_history.txt.enc -k 'wraith_above_the_waves'\\n`. Use standard en-US HID keymap. Total usb.pcap should be ~150 frames."
unintended_solve_traps:
  - "Do NOT include hist.txt or its decrypted contents anywhere in the bundle."
  - "Do not put the OpenSSL passphrase in the FTP session — the password ONLY appears in the USB capture."
  - "Verify both files (ftp.pcap and usb.pcap) display correctly in Wireshark with default dissectors."
  - "USB capture must use HID keyboard interrupt frames (transfer_type 0x01), not bulk transfers."
  - "Do not use a non-standard keymap (Dvorak etc.); en-US only."
  - "FTP credential AND USB keystrokes must both be required — do not let either alone yield the flag."
