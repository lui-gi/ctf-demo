  hint_for_powder_monkey: "Single text file 'parchment.txt'. Take a 3-4 sentence pirate-flavored paragraph that ENDS with the literal flag 'progctf{caesar_still_sails_with_us}'. Apply ROT13 to the entire paragraph (including the flag and braces — so the flag becomes 'cebtpgs{pnrfne_fgvyy_fnvyf_jvgu_hf}'). Preserve newlines, casing on letters, and punctuation. The flag must be the only flag-shaped token in the file."
unintended_solve_traps:
