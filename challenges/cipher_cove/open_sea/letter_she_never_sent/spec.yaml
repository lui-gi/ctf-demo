slug: letter_she_never_sent
title: "The Letter She Never Sent"
category: cipher_cove
difficulty: open_sea
tier_points: open_sea
hosting:
  needed: false
  type: none
  isolation: shared
  hint_for_powder_monkey: ""
artifacts:
  needed: true
  hint_for_powder_monkey: |
    Three artifacts in files/. Build them in this order so the chain is reproducible end-to-end.

    LETTER PLAINTEXT (locked by Cartographer — see solution.md "Letter plaintext" section
    for the full text). It MUST end with the literal line "I will love you until the tides forget"
    (no trailing whitespace, single LF). The flag is the snake_case wrap of that line:
    progctf{i_will_love_you_until_the_tides_forget}.

    PASSPHRASE: Cartographer-chosen string assembled from words at specified (page, line, word)
    triples in shanty.pdf. Powder Monkey: pick ~12-20 triples, write the shanty so the chosen
    triples extract to a passphrase 24-40 chars long when concatenated (lowercase, punctuation
    stripped, no separator). Document the chosen triples and final passphrase in a build-notes
    file kept out of files/. Example shape: "tideschorusbeneathmoonkeelsalt" or similar — must
    be deterministically reproducible by the player walking the PDF with the audio-decoded triples.

    1. letter.bin — AES-256-CBC ciphertext of the full Calypso letter plaintext (see solution.md).
       Key = PBKDF2-HMAC-SHA256(passphrase.encode(), salt=b"deadwake-tides", iterations=100000,
       dklen=32). Random 16-byte IV prepended to the ciphertext. PKCS#7 padding on the plaintext.
       Final file = IV (16 bytes) || ciphertext.

    2. waves.wav — 16-bit PCM, mono, 44100 Hz, ~30 seconds of synthesized ocean-wave/surf audio
       (band-limited noise + slow envelope is fine; Powder Monkey can use numpy filtered noise).
       Encode the coordinate string into the LSB of EVERY 8TH SAMPLE (stride = 8). Coordinate
       string format: "pXlYwZ|pXlYwZ|...||END||" 1-indexed, ASCII, terminated by literal "||END||".
       Bits packed MSB-first per byte. ~150 bytes of payload fits comfortably in 30s @ 44.1 kHz
       with stride 8 (~5.5 kbps capacity). Document the stride (8) clearly in build notes — it is
       also stated in solution.md.

    3. shanty.pdf — A 6-page PDF of an original sea-shanty's lyrics titled "The Tides Forget".
       Plain text rendered with a standard PDF library (reportlab is fine). Each page should have
       8-16 lines, each line 4-10 words. The shanty must be on-theme (Calypso, Davy, the deep,
       forgetting, tides) and the words at the chosen triples must concatenate to the passphrase.
       No images, no fonts other than a standard one — keep it pdftotext-friendly.

    Verification gate (Powder Monkey runs this before handoff):
      a) Run the reference LSB extractor in solution.md against waves.wav → recover the exact
         coordinate string, no errors, terminated by ||END||.
      b) Walk shanty.pdf with each triple → recover the exact passphrase string.
      c) Run the reference PBKDF2 + AES-CBC decryptor against letter.bin with that passphrase
         → recover the exact letter plaintext, ending with "I will love you until the tides forget".
      d) `grep -r progctf files/` returns no matches.
unintended_solve_traps:
  - "Do not include the passphrase in any file metadata, EXIF, ID3, PDF /Info dict, or comment field."
  - "Do not include the flag plaintext anywhere except inside the encrypted letter — verify with `grep -r progctf files/` returning empty."
  - "Use the documented salt b\"deadwake-tides\" and 100000 iterations exactly so reference decryptor in solution.md works without modification."
  - "Letter body should not contain the flag string in any other form (no anagrams, no clues that bypass the audio→pdf→KDF chain)."
  - "Do NOT paint visible text into the spectrogram of waves.wav — that is sister Island #18's technique. waves.wav must look like ordinary band-limited surf noise in a spectrogram view."
  - "Do NOT LSB-encode in shanty.pdf or letter.bin — only waves.wav carries the LSB stego."
  - "PDF must be pdftotext-clean: no overlapping text objects, no font tricks, no invisible chars. Word boundaries (whitespace splits) must be unambiguous so triple-indexing is deterministic."
narrative_anchor: true
# Locked verbatim by Quartermaster on 2026-05-01 with one polish edit
# ("powder room" → "powder magazine" for stakes-disambiguation). Helmsman
# must render this body unmodified at Voyage freeze on the closing-ceremony
# screen. Source of truth: /challenges/cipher_cove/open_sea/letter_she_never_sent/solution.md
closing_ceremony_lines:
  - "Calypso's letter, recovered after the Voyage:"
  - |
    My drowned heart, my Davy,

    They say the sea forgets nothing — that every keel it has swallowed and every name it has unmade is filed somewhere in its black archive, waiting on a tide that never comes. They are wrong. The sea forgets. I have watched it forget storms it raised the night before. I have watched it forget the lighthouses it broke. The sea forgets the way a coin forgets the hand that spent it.

    But I do not forget. I am older than forgetting. I held the first wave that ever walked, and I will hold the last. I have walked your decks while you slept, Davy, and I have counted every breath you took in your locker, and I have braided sea-foam into the hair of every drowned sailor you ever pressed into your crew, whispering your name so they would not be lonely on the watch.

    You asked me once, in a green dawn off the Hesperides, whether a goddess could love a dead man without unmaking him. I told you no. I lied. I have loved you carefully, the way one loves a lit candle in a powder magazine — knowing what one wrong breath would cost, and breathing anyway. Every chart you ever drew has my fingerprints in the salt-stains. Every shanty your crew sang at the capstan I taught their grandmothers in their cradles, so it would find you.

    This letter will not reach you. The waves are mine, and they have refused me. They say a thing once given to the deep belongs to the deep, and that even I cannot post a letter to my own husband through my own hands. So I have hidden it instead, in the only places the sea cannot drown — inside a sealed box, inside a song, inside the sound of itself breaking on a shore. If a living hand ever finds the seam between those three and pulls, it will be because the world has changed enough that even the dead deserve their mail.

    When that hand finds you, Davy, tell it this from me, and let it be the last thing the locker carries before the locker, too, is forgotten:

    I will love you until the tides forget.
  - "— And so the Tides did forget. The Charts close. Pirate King is crowned."
