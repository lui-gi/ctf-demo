slug: exif_of_the_drowned
title: "EXIF of the Drowned"
category: lighthouse
difficulty: port
tier_points: port
hosting:
  needed: false
  type: none
  isolation: shared
  hint_for_powder_monkey: ""
artifacts:
  needed: true
  hint_for_powder_monkey: "Generate 'wreck.jpg'. Use a moody public-domain or AI-generated grayscale shipwreck photo. Use exiftool to set the following EXIF tags: UserComment='progctf{a_thousand_leagues_in_metadata}', XPComment='progctf{a_thousand_leagues_in_metadata}', Make='Brass Plate Co.', Model='Tidewater Recoverer', Artist='Unknown salvager, Tideglass', ImageDescription='Recovered from the Maribel — date unknown.', GPSLatitude=49.123, GPSLongitude=-2.456. The flag must NOT appear in pixel data, ImageDescription, file name, or any other obvious-first-glance field — only in UserComment / XPComment."
unintended_solve_traps:
  - "Do not embed the flag in the visible image (no overlaid text)."
  - "Do not put the flag in ImageDescription — that's the first tag everyone reads."
  - "Do not append the flag after EOI marker — that turns this into a stego challenge instead of EXIF."
  - "Do not name the file 'flag.jpg' or include the flag in the filename."
